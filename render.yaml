# Render Blueprint — virellestudios
  # https://render.com/docs/blueprint-spec

  databases:
    - name: virelle-db
      plan: starter
      databaseName: virelle
      user: virelle
      region: oregon

  services:
    - type: web
      name: virellestudios
      runtime: docker
      dockerfilePath: ./Dockerfile
      region: oregon
      plan: starter
      healthCheckPath: /api/healthz
      # Render auto-injects PORT — gateway.mjs reads it, no change needed
      envVars:
        - key: NODE_ENV
          value: production
        - key: DATABASE_URL
          fromDatabase:
            name: virelle-db
            property: connectionString
        # ── Secrets: set these manually in the Render dashboard ──
        # REDIS_URL          → Upstash Redis connection string
        # JWT_SECRET
        # SESSION_SECRET
        # RUNWAY_API_KEY
        # FAL_KEY
        # OPENAI_API_KEY
        # GROQ_API_KEY
        # HUGGING_FACE_API_KEY
        # VENICE_API_KEY
        # VENICE_MODEL
        # POLLINATIONS_API_KEY
        # BUILT_IN_FORGE_API_KEY
        # BUILT_IN_FORGE_API_URL
        # AWS_ACCESS_KEY_ID
        # AWS_SECRET_ACCESS_KEY
        # AWS_S3_BUCKET
        # AWS_S3_ENDPOINT
        # AWS_REGION
        # STRIPE_SECRET_KEY
        # STRIPE_PUBLISHABLE_KEY
        # STRIPE_WEBHOOK_SECRET
        # (all other STRIPE_* price IDs)
        # GMAIL_USER
        # GMAIL_APP_PASSWORD
        # RESEND_API_KEY
        # EMAIL_FROM
        # ADMIN_EMAIL
        # TITAN_API_KEY
        # TITAN_API_URL
        # SENTRY_DSN
        # SENTRY_ENVIRONMENT
        # DEBUG_LOG_SECRET
        # OAUTH_SERVER_URL
        # OWNER_NAME
        # OWNER_OPEN_ID
        # TIKTOK_CLIENT_KEY
        # TIKTOK_CLIENT_SECRET
        # YOUTUBE_CLIENT_ID
        # YOUTUBE_CLIENT_SECRET
        # YOUTUBE_REFRESH_TOKEN
        # YOUTUBE_DATA_API_V3
        # YOUTUBE_CHANNEL_ID
