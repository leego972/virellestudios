# Render Blueprint — Virelle Studios
# The application is MySQL-native (mysql2 + Drizzle MySQL). Render's managed
# database product is PostgreSQL, so DATABASE_URL must point to an external
# managed MySQL 8.x service. Do not attach a Render PostgreSQL database.

services:
  - type: web
    name: virellestudios
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: starter
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: REDIS_URL
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: RUNWAY_API_KEY
        sync: false
      - key: FAL_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: HUGGING_FACE_API_KEY
        sync: false
      - key: VENICE_API_KEY
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_S3_BUCKET
        sync: false
      - key: AWS_S3_ENDPOINT
        sync: false
      - key: AWS_REGION
        sync: false
      - key: OAUTH_SERVER_URL
        sync: false
      - key: OWNER_NAME
        sync: false
      - key: OWNER_OPEN_ID
        sync: false
      - key: VITE_APP_ID
        sync: false
      - key: VITE_APP_TITLE
        sync: false
      - key: VITE_APP_LOGO
        sync: false
      - key: VITE_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: production
