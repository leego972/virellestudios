      <script>
          (function() {
            var splash = document.getElementById('_vl_splash');
            var gone = false;

            function hideSplash() {
              if (gone || !splash) return;
              gone = true;
              splash.classList.add('hidden');
              setTimeout(function() { if (splash && splash.parentNode) splash.remove(); }, 500);
            }

            /* Capture JS errors and show them in the splash so we can debug remotely */
            function showErr(msg) {
              if (!splash || gone) return;
              var el = document.getElementById('_vl_err') || document.createElement('div');
              el.id = '_vl_err';
              el.style.cssText = 'margin-top:20px;max-width:88vw;padding:10px 14px;background:#1a0000;border:1px solid #ff4444;border-radius:6px;color:#ff9999;font:11px/1.6 monospace;white-space:pre-wrap;word-break:break-all;text-align:left;';
              el.textContent = msg;
              if (!el.parentNode) splash.appendChild(el);
            }
            window.addEventListener('error', function(e) {
              showErr('ERROR: ' + (e.message || e.type) + (e.filename ? '
@ ' + e.filename.replace(/.*//,'') + ':' + e.lineno : ''));
            });
            window.addEventListener('unhandledrejection', function(e) {
              var msg = e.reason && e.reason.message ? e.reason.message : String(e.reason);
              showErr('PROMISE REJECTED: ' + msg.slice(0, 300));
            });

            /* Poll every 50ms — hides splash the moment React populates #root.
               type="module" scripts run BEFORE DOMContentLoaded, so MutationObserver
               attached at DOMContentLoaded always misses the React mount. */
            var checks = 0;
            var poll = setInterval(function() {
              checks++;
              var root = document.getElementById('root');
              if (root && root.firstElementChild) {
                clearInterval(poll);
                hideSplash();
              }
              /* After 20s with no mount and no error shown, display a hint */
              if (checks === 400 && !document.getElementById('_vl_err')) {
                showErr('App bundle loaded but React did not mount after 20s.\nOpen browser console (DevTools) for details.');
              }
            }, 50);

            /* Hard limit: 25s */
            setTimeout(function() { clearInterval(poll); hideSplash(); }, 25000);
          })();
        </script>
