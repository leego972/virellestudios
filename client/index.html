      <!-- Loading splash — visible immediately, before JS bundle loads -->
      <style>
        #_vl_splash {
          position: fixed; inset: 0; z-index: 9999;
          display: flex; flex-direction: column;
          align-items: center; justify-content: center; gap: 20px;
          background: #0a0a0a;
          transition: opacity 0.4s ease;
        }
        #_vl_splash.hidden { opacity: 0; pointer-events: none; }
        #_vl_dots { display: flex; gap: 6px; }
        #_vl_dots span {
          width: 6px; height: 6px; border-radius: 50%;
          background: #c8b49a; animation: _vl_bounce 1.2s ease-in-out infinite;
        }
        #_vl_dots span:nth-child(2) { animation-delay: 0.2s; }
        #_vl_dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes _vl_bounce {
          0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
          40% { transform: translateY(-8px); opacity: 1; }
        }
      </style>

      <div id="_vl_splash">
        <svg width="160" height="28" viewBox="0 0 160 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <text x="0" y="22" font-family="Georgia, serif" font-size="22" fill="#c8b49a" letter-spacing="6">VIRELLE</text>
        </svg>
        <div id="_vl_dots"><span></span><span></span><span></span></div>
      </div>

      <!-- Single consolidated debug + polling script.
           Runs AFTER splash div exists in DOM.
           Patches window.reportError so React 18's silent production-mode render
           errors (which bypass window.onerror on Safari) become visible. -->
      <script>
        (function() {
          var splash = document.getElementById('_vl_splash');
          var gone = false;

          function hideSplash() {
            if (gone || !splash) return;
            gone = true;
            splash.classList.add('hidden');
            setTimeout(function() { if (splash && splash.parentNode) splash.remove(); }, 500);
          }

          function showErr(msg) {
            // Stop the loading dots
            var dots = document.getElementById('_vl_dots');
            if (dots) dots.style.display = 'none';
            // Show or create error box inside splash
            var el = document.getElementById('_vl_err');
            if (!el) {
              el = document.createElement('div');
              el.id = '_vl_err';
              el.style.cssText = 'margin-top:20px;max-width:88vw;padding:10px 14px;background:#1a0000;border:1px solid #ff4444;border-radius:6px;color:#ff9999;font:11px/1.6 monospace;white-space:pre-wrap;word-break:break-all;text-align:left;';
              if (splash) splash.appendChild(el);
              else { document.body.appendChild(el); el.style.position = 'fixed'; el.style.top = '20px'; el.style.left = '20px'; el.style.zIndex = '999999'; }
            }
            el.textContent = (el.textContent ? el.textContent + '\n\n' : '') + msg;
            // Ensure splash stays visible when an error occurs
            if (splash) { splash.classList.remove('hidden'); splash.style.opacity = '1'; splash.style.pointerEvents = 'none'; }
            clearInterval(poll);
            clearTimeout(safetyTimer);
          }

          // Intercept window.onerror (synchronous JS errors, including module parse failures)
          window.addEventListener('error', function(e) {
            var file = e.filename ? e.filename.replace(/^.*\//, '') : '';
            showErr('JS ERROR: ' + (e.message || String(e.error)) + (file ? '\n@ ' + file + ':' + e.lineno : ''));
          });

          // Intercept unhandled Promise rejections (async errors, dynamic import failures)
          window.addEventListener('unhandledrejection', function(e) {
            var msg = (e.reason && e.reason.message) ? e.reason.message : String(e.reason);
            showErr('PROMISE REJECTED: ' + msg.slice(0, 400));
          });

          // Intercept React 18 internal render errors.
          // React 18 production mode calls window.reportError() for uncaught render errors
          // (no ErrorBoundary to catch them). On iOS Safari this does NOT bubble to
          // window.onerror, so we must patch reportError directly.
          var _origReportError = window.reportError;
          window.reportError = function(err) {
            var msg = (err && err.message) ? err.message + (err.stack ? '\n' + err.stack.slice(0, 600) : '') : String(err);
            showErr('REACT INTERNAL ERROR:\n' + msg);
            if (typeof _origReportError === 'function') _origReportError.call(window, err);
          };

          // Poll every 50ms — hide splash the instant React populates #root
          var checks = 0;
          var poll = setInterval(function() {
            checks++;
            var root = document.getElementById('root');
            if (root && root.firstElementChild) {
              clearInterval(poll);
              clearTimeout(safetyTimer);
              hideSplash();
              return;
            }
            // After 20s with no mount and no error, show a hint
            if (checks === 400 && !document.getElementById('_vl_err')) {
              showErr('Bundle loaded but React did not mount after 20s.\nCheck browser DevTools console for details.');
            }
          }, 50);

          // Hard safety: force-remove splash after 25s regardless
          var safetyTimer = setTimeout(function() {
            clearInterval(poll);
            hideSplash();
          }, 25000);
        })();
      </script>

      <div id="root"></div>
