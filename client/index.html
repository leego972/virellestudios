      <!-- Loading splash: visible immediately, before JS bundle loads -->
      <style>
        #_vl_splash {
          position: fixed; inset: 0; z-index: 9999;
          display: flex; flex-direction: column;
          align-items: center; justify-content: center; gap: 20px;
          background: #0a0a0a;
          transition: opacity 0.4s ease;
        }
        #_vl_splash.hidden { opacity: 0; pointer-events: none; }
        #_vl_splash svg { animation: _vl_pulse 2s ease-in-out infinite; }
        @keyframes _vl_pulse {
          0%, 100% { opacity: 0.7; transform: scale(1); }
          50% { opacity: 1; transform: scale(1.05); }
        }
        #_vl_dots { display: flex; gap: 6px; }
        #_vl_dots span {
          width: 6px; height: 6px; border-radius: 50%;
          background: #c8b49a; animation: _vl_bounce 1.2s ease-in-out infinite;
        }
        #_vl_dots span:nth-child(2) { animation-delay: 0.2s; }
        #_vl_dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes _vl_bounce {
          0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
          40% { transform: translateY(-8px); opacity: 1; }
        }
      </style>

      <div id="_vl_splash">
        <!-- VirÉlle wordmark -->
        <svg width="160" height="28" viewBox="0 0 160 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <text x="0" y="22" font-family="Georgia, serif" font-size="22" fill="#c8b49a" letter-spacing="6">VIRELLE</text>
        </svg>
        <div id="_vl_dots"><span></span><span></span><span></span></div>
      </div>

      <script>
          (function() {
            var splash = document.getElementById('_vl_splash');
            var gone = false;
            function hideSplash() {
              if (gone || !splash) return;
              gone = true;
              splash.classList.add('hidden');
              setTimeout(function() { if (splash && splash.parentNode) splash.remove(); }, 500);
            }
            /* Poll every 50ms — works regardless of whether React commits before or
               after DOMContentLoaded. type="module" scripts run before DOMContentLoaded,
               so a MutationObserver attached at DOMContentLoaded always misses the mount. */
            var poll = setInterval(function() {
              var root = document.getElementById('root');
              if (root && root.firstElementChild) { clearInterval(poll); hideSplash(); }
            }, 50);
            /* Hard safety: remove splash after 20s no matter what */
            setTimeout(function() { clearInterval(poll); hideSplash(); }, 20000);
          })();
        </script>

      <div id="root"></div>
