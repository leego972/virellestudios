name: Finalize Costume Continuity

on:
  push:
    branches:
      - fix/mandatory-character-costume-continuity
    paths:
      - ".github/scripts/finalize_costume_occlusion.py"
      - ".github/workflows/finalize-costume-continuity.yml"

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/mandatory-character-costume-continuity
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply focused continuity corrections
        run: python .github/scripts/finalize_costume_occlusion.py
      - name: Commit product corrections
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Keep assigned costumes continuous without blocking generation"
          git push origin HEAD:fix/mandatory-character-costume-continuity
