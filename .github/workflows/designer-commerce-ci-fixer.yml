name: Apply designer commerce CI fixes

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/designer-commerce-ci-fixer.yml"

permissions:
  contents: write

jobs:
  fix-feature-branch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/designer-commerce-shipping-v1
          fetch-depth: 0
      - name: Apply targeted CI fixes
        run: python3 scripts/fix-designer-commerce-ci.py
      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add client server
          git rm -f scripts/fix-designer-commerce-ci.py
          git commit -m "Fix designer commerce TypeScript checks"
          git push origin HEAD:feature/designer-commerce-shipping-v1
