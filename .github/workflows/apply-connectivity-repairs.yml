name: Apply Connectivity Repairs

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/apply-connectivity-repairs.yml"

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'audit/repository-debug-2026-07-19'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Apply verified connectivity repairs
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              if new in text:
                  print(f"{path}: already repaired")
                  return
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one exact source match, found {count}")
              file.write_text(text.replace(old, new, 1))
              print(f"{path}: repaired")

          replace_once(
              "client/src/App.tsx",
              '''  const MusicStudio = lazy(() => import("./pages/MusicStudio"));
            const DubbingStudio = lazy(() => import("./pages/DubbingStudio"));
            const AudioMixer = lazy(() => import("./pages/AudioMixer"));
            const AccessibilityStudio = lazy(() => import("./pages/AccessibilityStudio"));
            const LocationStudio = lazy(() => import("./pages/LocationStudio"));''',
              '''const MusicStudio = lazy(() => import("./pages/MusicStudio"));
          const DubbingStudio = lazy(() => import("./pages/DubbingStudio"));
          const DubbingHub = lazy(() => import("./pages/DubbingHub"));
          const AudioMixer = lazy(() => import("./pages/AudioMixer"));
          const AccessibilityStudio = lazy(() => import("./pages/AccessibilityStudio"));
          const LocationStudio = lazy(() => import("./pages/LocationStudio"));
          const SwappysHub = lazy(() => import("./pages/SwappysHub"));''',
          )
          replace_once(
              "client/src/App.tsx",
              '''      <Route path="/projects/:projectId/vfx-suite/:sceneId" component={GatedVFXSuite} />
                    <Route path="/projects/:projectId/vfx-suite" component={GatedVFXSuite} />''',
              '''      <Route path="/projects/:projectId/vfx-suite/:sceneId" component={GatedVFXSuite} />
                    <Route path="/projects/:projectId/vfx-suite" component={GatedVFXSuite} />
                    <Route path="/projects/:projectId/dubbing" component={DubbingStudio} />
                    <Route path="/projects/:projectId/audio-mixer" component={AudioMixer} />''',
          )
          replace_once(
              "client/src/App.tsx",
              '''              <Route path="/poster-maker">{() => <AdPosterMaker />}</Route>
                            <Route path="/characters">{() => <Characters />}</Route>''',
              '''              <Route path="/poster-maker">{() => <AdPosterMaker />}</Route>
                            <Route path="/swappys">{() => <LazyPage><SwappysHub /></LazyPage>}</Route>
                            <Route path="/vfx-studio">{() => <LazyPage><VFXStudio /></LazyPage>}</Route>
                            <Route path="/music-studio">{() => <LazyPage><MusicStudio /></LazyPage>}</Route>
                            <Route path="/dubbing-studio">{() => <LazyPage><DubbingHub /></LazyPage>}</Route>
                            <Route path="/accessibility-studio">{() => <LazyPage><AccessibilityStudio /></LazyPage>}</Route>
                            <Route path="/location-studio">{() => <LazyPage><LocationStudio /></LazyPage>}</Route>
                            <Route path="/projects/:projectId/characters">{() => <Characters />}</Route>
                            <Route path="/characters">{() => <Characters />}</Route>''',
          )

          replace_once(
              "client/src/components/DashboardLayout.tsx",
              '{ icon: Smartphone, label: "Swappys (Face Swap)", path: "/projects" }, // Swappys is integrated into the VFX Suite per-project',
              '{ icon: Smartphone, label: "Swappys (Face Swap)", path: "/swappys" },',
          )
          replace_once(
              "client/src/pages/SwappysHub.tsx",
              'setLocation(`/projects/${projectId}/scenes/${sceneId}/vfx-suite`);',
              'setLocation(`/projects/${projectId}/vfx-suite/${sceneId}`);',
          )
          replace_once(
              "client/src/pages/CuttingRoom.tsx",
              '<a href={`/movies/${trailerMovieId}`} className="inline-flex items-center gap-1.5 text-xs text-indigo-400 hover:text-indigo-300 transition-colors">',
              '<a href="/movies" className="inline-flex items-center gap-1.5 text-xs text-indigo-400 hover:text-indigo-300 transition-colors">',
          )
          replace_once(
              "client/src/pages/ProjectDetail.tsx",
              'setLocation(`/projects/${projectId}/approvals`)',
              'setLocation(`/projects/${projectId}/approval-chain`)',
          )
          replace_once(
              "client/src/pages/VFXStudio.tsx",
              'setLocation("/settings/api-keys")',
              'setLocation("/settings/byok")',
          )
          replace_once(
              "client/src/pages/VFXStudio.tsx",
              '''function packImageUrl(_id: number): string {
              return "";
            }''',
              '''function packImageUrl(id: number): string {
              const prompt = PACK_IMAGE_PROMPTS[id];
              if (!prompt) return "";
              const seed = id * 7919 + 2026;
              return `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=768&height=512&nologo=true&enhance=true&model=flux&seed=${seed}`;
            }''',
          )

          replace_once(
              "client/src/pages/Showcase.tsx",
              '''                <button
                          type="button"
                          className="flex items-center gap-2 px-6 py-3.5 rounded-xl border border-amber-500/30 text-amber-400 text-sm font-semibold cursor-pointer hover:bg-amber-500/10 transition-all active:scale-95"
                        >
                          <Sparkles className="w-4 h-4" />
                          Ready for Generation
                        </button>''',
              '''                <div
                          role="status"
                          className="flex items-center gap-2 px-6 py-3.5 rounded-xl border border-amber-500/30 text-amber-400 text-sm font-semibold"
                        >
                          <Sparkles className="w-4 h-4" />
                          Ready for Generation
                        </div>''',
          )

          replace_once(
              "client/src/pages/Subtitles.tsx",
              'const [signNotes, setSignNotes] = useState<Array<{ sceneId: string; notes: string }>>([]);',
              'const [signNotes, setSignNotes] = useState<Record<"ASL" | "BSL", string>>({ ASL: "", BSL: "" });',
          )
          replace_once(
              "client/src/pages/Subtitles.tsx",
              '''    const exportDeafTrack = () => {
                    if (!deafEntries.length) { toast.error("No entries"); return; }
                    const lines = deafEntries.map((e, i) =>
                      `${i+1}\n${formatTime(e.startTime)} --> ${formatTime(e.endTime)}\n[${e.description.toUpperCase()}]\n`
                    ).join("\n");
                    downloadFile("WEBVTT\n\n" + lines.replace(/,/g,"."), "deaf-hoh-track.vtt", "text/vtt");
                    toast.success("D/deaf & HoH track exported as VTT");
                  };''',
              '''    const exportDeafTrack = () => {
                    if (!deafEntries.length) { toast.error("No entries"); return; }
                    const lines = deafEntries.map((e, i) =>
                      `${i+1}\n${formatTime(e.startTime)} --> ${formatTime(e.endTime)}\n[${e.description.toUpperCase()}]\n`
                    ).join("\n");
                    downloadFile("WEBVTT\n\n" + lines.replace(/,/g,"."), "deaf-hoh-track.vtt", "text/vtt");
                    toast.success("D/deaf & HoH track exported as VTT");
                  };

                  const exportSignBrief = (language: "ASL" | "BSL") => {
                    const notes = signNotes[language].trim();
                    if (!notes) { toast.error(`Add ${language} interpreter guidance before exporting.`); return; }
                    const projectName = `project-${projectId || "untitled"}`;
                    const brief = [
                      `${language} INTERPRETER PRODUCTION BRIEF`,
                      `Project: ${projectName}`,
                      `Generated: ${new Date().toISOString()}`,
                      "",
                      notes,
                      "",
                      "Production note: confirm framing, eyelines, safe title area and interpreter visibility with the accessibility supervisor before final delivery.",
                    ].join("\n");
                    downloadFile(brief, `${projectName}-${language.toLowerCase()}-interpreter-brief.txt`, "text/plain;charset=utf-8");
                    toast.success(`${language} production brief exported.`);
                  };''',
          )
          replace_once(
              "client/src/pages/Subtitles.tsx",
              '''                      <Textarea
                                placeholder={`Scene-by-scene ${lang} interpreter guidance...\n\nScene 1: Establish interpreter frame, bottom-right\nScene 2: Close-up on emotional dialogue — interpreter prominent\nScene 3: Action sequence — maintain corner frame...`}
                                className="min-h-[200px] text-xs bg-background/50 resize-none"
                              />
                              <Button size="sm" variant="outline" className="w-full gap-2 hover:border-amber-500/50 hover:text-amber-400">
                                <Download className="h-3.5 w-3.5" />Export {lang} Brief
                              </Button>''',
              '''                      <Textarea
                                value={signNotes[lang as "ASL" | "BSL"]}
                                onChange={(event) => setSignNotes((current) => ({ ...current, [lang]: event.target.value }))}
                                placeholder={`Scene-by-scene ${lang} interpreter guidance...\n\nScene 1: Establish interpreter frame, bottom-right\nScene 2: Close-up on emotional dialogue — interpreter prominent\nScene 3: Action sequence — maintain corner frame...`}
                                className="min-h-[200px] text-xs bg-background/50 resize-none"
                              />
                              <Button type="button" size="sm" variant="outline" className="w-full gap-2 hover:border-amber-500/50 hover:text-amber-400" onClick={() => exportSignBrief(lang as "ASL" | "BSL")}>
                                <Download className="h-3.5 w-3.5" />Export {lang} Brief
                              </Button>''',
          )

          replace_once(
              "shared/feature-registry.ts",
              '''  // ── AI VIDEO ─────────────────────────────────────────────────────────────
            {''',
              '''  // ── AI VIDEO ─────────────────────────────────────────────────────────────
            {
              id: "swappys",
              label: "Swappys Transform Studio",
              icon: "🎭",
              category: "AI Video",
              webPath: "/swappys",
              description: "Consent-controlled still-image transformation and production VFX handoff",
              minTier: "free",
              hasNative: true,
              isNew: true,
            },
            {''',
          )

          # Remove the audit's known tRPC helper false positives.
          replace_once(
              "scripts/repository-connectivity-audit.mjs",
              '''  for (const usage of trpcUsages) {
                if (!mountedRoots.has(usage.root)) finding(findings, "error", "trpc-connectivity", usage.file, usage.line, `Client calls unmounted tRPC root: trpc.${usage.root}`);
              }''',
              '''  const clientHelperRoots = new Set(["Provider", "createClient", "useContext", "useUtils"]);
              for (const usage of trpcUsages) {
                if (clientHelperRoots.has(usage.root)) continue;
                if (!mountedRoots.has(usage.root)) finding(findings, "error", "trpc-connectivity", usage.file, usage.line, `Client calls unmounted tRPC root: trpc.${usage.root}`);
              }''',
          )
          PY
      - name: Commit repairs
        shell: bash
        run: |
          git config user.name "Virelle Connectivity Bot"
          git config user.email "actions@users.noreply.github.com"
          git add client/src/App.tsx client/src/components/DashboardLayout.tsx client/src/pages/SwappysHub.tsx client/src/pages/CuttingRoom.tsx client/src/pages/ProjectDetail.tsx client/src/pages/VFXStudio.tsx client/src/pages/Showcase.tsx client/src/pages/Subtitles.tsx shared/feature-registry.ts scripts/repository-connectivity-audit.mjs
          git diff --cached --check
          if git diff --cached --quiet; then
            echo "Connectivity repairs already applied."
            exit 0
          fi
          git commit -m "Connect routes navigation exports media and Swappys registry"
          git push origin HEAD:${{ github.head_ref }}
