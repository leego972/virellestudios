name: Finalize Costume Occlusion

on:
  push:
    branches:
      - fix/mandatory-character-costume-continuity
    paths:
      - ".github/scripts/finalize_costume_occlusion.py"
      - ".github/workflows/finalize-costume-occlusion.yml"
  pull_request:
    branches:
      - main
    paths:
      - ".github/scripts/finalize_costume_occlusion.py"
      - ".github/workflows/finalize-costume-occlusion.yml"

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/mandatory-character-costume-continuity
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply final occlusion rules
        shell: bash
        run: |
          set +e
          python .github/scripts/finalize_costume_occlusion.py > /tmp/finalize-output.txt 2>&1
          STATUS=$?
          if [ "$STATUS" -ne 0 ]; then
            git reset --hard HEAD
            cp /tmp/finalize-output.txt .github/finalize-costume-occlusion-error.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/finalize-costume-occlusion-error.txt
            git commit -m "Record final costume occlusion diagnostic"
            git push origin HEAD:fix/mandatory-character-costume-continuity
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Make costume coverage literal and continuous"
          git push origin HEAD:fix/mandatory-character-costume-continuity
