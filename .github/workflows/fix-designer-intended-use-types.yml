name: Repair Designer Intended Use Types

on:
  push:
    branches:
      - designer/connected-onboarding-listings-2026-07-21
    paths:
      - ".github/workflows/fix-designer-intended-use-types.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: designer/connected-onboarding-listings-2026-07-21
          fetch-depth: 0
          persist-credentials: true

      - name: Preserve runtime validation with string-array inference
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path("server/designer-portal-router.ts")
          source = path.read_text(encoding="utf-8")
          pattern = re.compile(
              r'const intendedUseSchema = z\.enum\(\[\n'
              r'(.*?)'
              r'\n\]\);',
              re.DOTALL,
          )
          match = pattern.search(source)
          if not match:
              raise SystemExit("intendedUseSchema enum block not found")

          values = match.group(1)
          replacement = f'''const INTENDED_USE_VALUES = new Set([\n{values}\n]);\n\nconst intendedUseSchema: z.ZodType<string> = z\n  .string()\n  .max(64)\n  .refine(\n    value => INTENDED_USE_VALUES.has(value),\n    "Invalid intended use",\n  );'''
          updated = source[:match.start()] + replacement + source[match.end():]
          path.write_text(updated, encoding="utf-8")
          PY

      - name: Remove temporary workflow and commit
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/fix-designer-intended-use-types.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix designer intended-use input inference"
          git push origin HEAD:designer/connected-onboarding-listings-2026-07-21
