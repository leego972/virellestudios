name: Apply designer commerce branch patch

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/designer-commerce-branch-patcher.yml"

permissions:
  contents: write

jobs:
  patch-feature-branch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/designer-commerce-shipping-v1
          fetch-depth: 0
      - name: Apply guarded integration
        run: python3 scripts/apply-designer-commerce-patch.py
      - name: Commit feature branch integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add drizzle/schema.ts server client
          if git diff --cached --quiet; then
            echo "No patch changes to commit"
          else
            git commit -m "Integrate separate designer commerce and shipping"
            git push origin HEAD:feature/designer-commerce-shipping-v1
          fi
