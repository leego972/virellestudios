name: Apply Designer Shell Isolation

on:
  push:
    branches:
      - designer/connected-onboarding-listings-2026-07-21
    paths:
      - ".github/workflows/apply-designer-shell-isolation.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: designer/connected-onboarding-listings-2026-07-21
          fetch-depth: 0
          persist-credentials: true

      - name: Bypass filmmaker shell for designer-only accounts
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("client/src/components/DashboardLayout.tsx")
          source = path.read_text(encoding="utf-8")
          replacements = [
              (
                  'import { useAuth } from "@/_core/hooks/useAuth";\n',
                  'import { useAuth } from "@/_core/hooks/useAuth";\nimport { trpc } from "@/lib/trpc";\n',
              ),
              (
                  '  const { loading, user } = useAuth();\n  const [currentPath] = useLocation();\n',
                  '  const { loading, user } = useAuth();\n  const {\n    data: designerAccess,\n    isLoading: designerAccessLoading,\n  } = trpc.wardrobeMarket.portal.getAccessStatus.useQuery(undefined, {\n    enabled: Boolean(user),\n    retry: false,\n  });\n  const [currentPath] = useLocation();\n',
              ),
              (
                  '  if (loading || (!user && !publicRoute)) {\n',
                  '  if (\n    loading ||\n    (!user && !publicRoute) ||\n    (Boolean(user) && designerAccessLoading)\n  ) {\n',
              ),
              (
                  '  if (!user && publicRoute) {\n    return <>{children}</>;\n  }\n\n  if (\n',
                  '  if (!user && publicRoute) {\n    return <>{children}</>;\n  }\n\n  if (designerAccess?.designerOnly) {\n    return <>{children}</>;\n  }\n\n  if (\n',
              ),
          ]
          for old, new in replacements:
              count = source.count(old)
              if count != 1:
                  raise SystemExit(f"Expected one occurrence, found {count}: {old!r}")
              source = source.replace(old, new, 1)
          path.write_text(source, encoding="utf-8")
          PY

      - name: Remove temporary workflow and commit
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/apply-designer-shell-isolation.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Isolate Designer-only accounts from filmmaker shell"
          git push origin HEAD:designer/connected-onboarding-listings-2026-07-21
