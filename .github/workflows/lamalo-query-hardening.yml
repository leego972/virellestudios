name: Harden Lamalo inventory queries

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/lamalo-query-hardening.yml"

permissions:
  contents: write

jobs:
  patch-test-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Apply guarded query hardening
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_between(text: str, start_marker: str, end_marker: str, replacement: str, label: str) -> str:
              start = text.find(start_marker)
              if start < 0:
                  raise SystemExit(f"{label}: start marker not found")
              end = text.find(end_marker, start)
              if end < 0:
                  raise SystemExit(f"{label}: end marker not found")
              return text[:start] + replacement + text[end:]

          router = Path("server/lamalo-gifts-router.ts")
          text = router.read_text()
          text = replace_between(
              text,
              "async function hasStarterInventory(",
              "/**\n * Production should already have Lamalo seeded.",
              '''async function hasStarterInventory(
            db: NonNullable<Awaited<ReturnType<typeof getDb>>>,
            profileId: number,
          ): Promise<boolean> {
            const rows = await db
              .select({ name: wardrobeItems.name })
              .from(wardrobeItems)
              .where(
                and(
                  eq(wardrobeItems.designerProfileId, profileId),
                  eq(wardrobeItems.visibility, "public"),
                  eq(wardrobeItems.status, "active"),
                ),
              )
              .groupBy(wardrobeItems.name)
              .limit(STARTER_OPTION_COUNT);
            return rows.length >= STARTER_OPTION_COUNT;
          }

          ''',
              "distinct starter inventory query",
          )

          text = replace_between(
              text,
              "      const fallback = await db",
              "      const existingIds = new Set(ordered.map(item => item.id));",
              '''      const fallback = await db
                .select(starterSelection)
                .from(wardrobeItems)
                .where(
                  and(
                    eq(wardrobeItems.designerProfileId, lamaloId),
                    eq(wardrobeItems.visibility, "public"),
                    eq(wardrobeItems.status, "active"),
                  ),
                )
                .orderBy(asc(wardrobeItems.id))
                .limit(2000);
          ''',
              "ordered full-catalogue fallback",
          )
          router.write_text(text)

          checker = Path("scripts/check-lamalo-welcome-contract.mjs")
          lines = checker.read_text().splitlines()
          anchor = 'assert.ok(gifts.includes("existingNames.has(item.name)"), "fallback welcome choices must deduplicate catalogue names");'
          if anchor not in lines:
              raise SystemExit("contract query assertion anchor not found")
          index = lines.index(anchor)
          lines[index + 1:index + 1] = [
              'assert.ok(gifts.includes(".groupBy(wardrobeItems.name)"), "starter inventory readiness must count distinct catalogue names in SQL");',
              'assert.ok(gifts.includes(".limit(2000)"), "fallback must scan at least one complete Lamalo catalogue");',
          ]
          checker.write_text("\n".join(lines) + "\n")
          PY

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lamalo welcome contract
        run: node scripts/check-lamalo-welcome-contract.mjs
      - name: TypeScript check
        run: pnpm check
      - name: Wardrobe regression tests
        run: pnpm vitest run server/wardrobePurchaseFulfillment.test.ts server/wardrobeContinuity.test.ts server/sceneWardrobeContinuity.test.ts
      - name: Render production build
        run: pnpm build

      - name: Commit verified query hardening
        shell: bash
        run: |
          git config user.name "Virelle Repair Bot"
          git config user.email "actions@users.noreply.github.com"
          git add server/lamalo-gifts-router.ts scripts/check-lamalo-welcome-contract.mjs
          git commit -m "Count distinct Lamalo inventory and scan stable fallback"
          git push origin HEAD:${{ github.head_ref }}
