name: Harden Lamalo inventory queries

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/lamalo-query-hardening.yml"

permissions:
  contents: write

jobs:
  patch-test-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Apply guarded query hardening
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected one match, found {count}")
              return text.replace(old, new, 1)

          router = Path("server/lamalo-gifts-router.ts")
          text = router.read_text()
          text = replace_once(
              text,
              '''    )
              .limit(100);
            return new Set(rows.map(row => row.name).filter(Boolean)).size >= STARTER_OPTION_COUNT;
          ''',
              '''    )
              .groupBy(wardrobeItems.name)
              .limit(STARTER_OPTION_COUNT);
            return rows.length >= STARTER_OPTION_COUNT;
          ''',
              "distinct starter inventory query",
          )
          text = replace_once(
              text,
              '''        )
                .limit(100);
              const existingIds = new Set(ordered.map(item => item.id));
          ''',
              '''        )
                .orderBy(asc(wardrobeItems.id))
                .limit(2000);
              const existingIds = new Set(ordered.map(item => item.id));
          ''',
              "ordered full-catalogue fallback",
          )
          router.write_text(text)

          checker = Path("scripts/check-lamalo-welcome-contract.mjs")
          text = checker.read_text()
          anchor = 'assert.ok(gifts.includes("existingNames.has(item.name)"), "fallback welcome choices must deduplicate catalogue names");'
          addition = anchor + '\nassert.ok(gifts.includes(".groupBy(wardrobeItems.name)"), "starter inventory readiness must count distinct catalogue names in SQL");\nassert.ok(gifts.includes(".limit(2000)"), "fallback must scan at least one complete Lamalo catalogue");'
          text = replace_once(text, anchor, addition, "contract query assertions")
          checker.write_text(text)
          PY

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lamalo welcome contract
        run: node scripts/check-lamalo-welcome-contract.mjs
      - name: TypeScript check
        run: pnpm check
      - name: Wardrobe regression tests
        run: pnpm vitest run server/wardrobePurchaseFulfillment.test.ts server/wardrobeContinuity.test.ts server/sceneWardrobeContinuity.test.ts
      - name: Render production build
        run: pnpm build

      - name: Commit verified query hardening
        shell: bash
        run: |
          git config user.name "Virelle Repair Bot"
          git config user.email "actions@users.noreply.github.com"
          git add server/lamalo-gifts-router.ts scripts/check-lamalo-welcome-contract.mjs
          git commit -m "Count distinct Lamalo inventory and scan stable fallback"
          git push origin HEAD:${{ github.head_ref }}
