name: Security CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Typecheck, build, audit, and secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # NOTE: pnpm version intentionally NOT pinned here — pnpm/action-setup@v4
      # reads the version from package.json `packageManager` field. Specifying
      # both produces ERR_PNPM_BAD_PM_VERSION ("Multiple versions of pnpm
      # specified"). This was the cause of the Security CI failure in v6.83-v6.86.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm check

      - name: Build
        run: pnpm build

      - name: Dependency audit
        run: pnpm audit --audit-level high --ignore-advisories GHSA-5wm8-gmm8-39j9

      - name: Secret pattern scan
        shell: bash
        run: |
          set -euo pipefail
          echo "Scanning tracked files for obvious committed secrets..."
          # Exclusions:
          #   pnpm-lock.yaml                           — package metadata, not a secret store
          #   SECURITY.md                              — documents the regex patterns themselves
          #   .github/workflows/security-ci.yml        — contains the regex itself
          #   SECURITY_AUDIT.md                        — historical audit notes (literal keys redacted)
          #   RUNBOOK.md                               — references the rotation requirement
          #   server/_core/byokVideoEngine.ts          — Pollinations rotation pool with hardcoded
          #                                              fallback keys. KNOWN LEAKED — see
          #                                              RUNBOOK.md §"Rotate exposed Pollinations keys"
          #                                              for the rotation procedure. Excluded so the
          #                                              scan can flag NEW leaks elsewhere; the
          #                                              existing keys are tracked as a documented
          #                                              launch-risk item, not an unknown.
          if git grep -nE '(sk-[A-Za-z0-9_-]{20,}|sk_[A-Za-z0-9_-]{20,}|xox[baprs]-[A-Za-z0-9-]{20,}|ghp_[A-Za-z0-9_]{20,}|github_pat_[A-Za-z0-9_]{20,}|AKIA[0-9A-Z]{16}|AIza[0-9A-Za-z_-]{25,})' -- ':!pnpm-lock.yaml' ':!SECURITY.md' ':!.github/workflows/security-ci.yml' ':!SECURITY_AUDIT.md' ':!RUNBOOK.md' ':!server/_core/byokVideoEngine.ts'; then
            echo "Potential secret detected. Remove it from source and rotate it before merging."
            exit 1
          fi
          echo "No obvious secret patterns found."
