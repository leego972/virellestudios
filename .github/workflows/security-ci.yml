name: Security CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-audit-repairs:
    if: github.head_ref == 'audit/quality-security-pass-20260721'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Apply surgical source repairs
        run: python scripts/apply-security-pass.py
      - name: Regenerate lockfile
        run: pnpm install --lockfile-only --no-frozen-lockfile
      - name: Verify clean dependency audit
        run: pnpm audit
      - name: Install and verify
        run: |
          pnpm install --frozen-lockfile
          pnpm check
          pnpm test
          pnpm build
        env:
          NODE_ENV: production
          VITE_APP_ID: security-ci-stub
          VITE_SENTRY_DSN: ""
      - name: Commit repairs
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Audit repairs are already applied."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json pnpm-lock.yaml .github/workflows/ci.yml .github/workflows/security-ci.yml \
            server/_core/sanitize.ts server/_core/remoteUrlSecurity.ts server/_core/llm.ts \
            server/_core/voiceTranscription.ts server/_core/rateLimit.ts server/_core/oauth.ts \
            server/_core/index.ts gateway.mjs client/public/sw.js server/_core/videoJobWorker.ts \
            client/src/components/ui/chart.tsx client/src/pages/SeriesBible.tsx \
            server/advertising-orchestrator.ts server/_core/securityHeaders.ts
          git commit -m "Complete repository quality and security repairs"
          git push origin "HEAD:${{ github.head_ref }}"

  verify:
    name: Typecheck, test, build, audit, and secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm check

      - name: Unit and integration tests
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          NODE_ENV: production
          VITE_APP_ID: security-ci-stub
          VITE_SENTRY_DSN: ""

      - name: Dependency audit
        id: audit
        shell: bash
        run: |
          set +e
          pnpm audit --audit-level moderate 2>&1 | tee dependency-audit.txt
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload dependency audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit
          path: dependency-audit.txt
          retention-days: 3

      - name: Secret pattern scan
        shell: bash
        run: |
          set -euo pipefail
          echo "Scanning tracked files for obvious committed secrets..."
          pattern='(sk-[A-Za-z0-9_-]{20,}|sk_[A-Za-z0-9_-]{20,}|xox[baprs]-[A-Za-z0-9-]{20,}|gh[pousr]_[A-Za-z0-9_]{20,}|github_pat_[A-Za-z0-9_]{20,}|AKIA[0-9A-Z]{16}|ASIA[0-9A-Z]{16}|AIza[0-9A-Za-z_-]{25,}|-----BEGIN (RSA |EC |OPENSSH |DSA )?PRIVATE KEY-----|whsec_[A-Za-z0-9]{20,}|rk_(live|test)_[A-Za-z0-9]{20,}|sk_(live|test)_[A-Za-z0-9]{20,})'
          if git grep -nEI "$pattern" -- ':!pnpm-lock.yaml' ':!SECURITY.md' ':!.github/workflows/security-ci.yml' ':!SECURITY_AUDIT.md' ':!RUNBOOK.md'; then
            echo "Potential secret detected. Remove it from source and rotate it before merging."
            exit 1
          fi
          echo "No obvious secret patterns found."

      - name: Fail when dependency audit found moderate-or-higher vulnerabilities
        if: steps.audit.outputs.exit_code != '0'
        run: exit 1
