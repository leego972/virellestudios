name: Hardening Diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  exact-source-repair:
    if: startsWith(github.head_ref, 'gpt/professional-pipeline-hardening-')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Repair confirmed TypeScript blockers
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              if new in text:
                  return
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected exactly one source match, found {count}")
              file.write_text(text.replace(old, new, 1))

          replace_once(
              "client/src/pages/UserInventoryPage.tsx",
              "  const rows = (inventory ?? []) as InventoryRow[];",
              "  const rows = (inventory ?? []) as unknown as InventoryRow[];",
          )

          replace_once(
              "server/db.ts",
              '''export async function getAllActiveSocialCredentials(): Promise<UserSocialCredential[]> {
            return db.select().from(userSocialCredentials)
              .where(eq(userSocialCredentials.isActive, true));
          }'''.replace("          ", ""),
              '''export async function getAllActiveSocialCredentials(): Promise<UserSocialCredential[]> {
            const db = await getDb();
            if (!db) return [];
            return db.select().from(userSocialCredentials)
              .where(eq(userSocialCredentials.isActive, true));
          }'''.replace("          ", ""),
          )

          replace_once(
              "server/seo-engine.ts",
              '''        intent: "informational",
                  generatedAt: Date.now(),'''.replace("        ", ""),
              '''        intent: "informational",
                  suggestedUrl: "/blog/ai-filmmaking-tools-beginners-2026",
                  competitorUrls: [],
                  generatedAt: Date.now(),'''.replace("        ", ""),
          )

          vfx_path = Path("server/vfx-sfx-router.ts")
          text = vfx_path.read_text()
          router_start = text.index("  createStudioVfxJob: protectedProcedure")
          router_end = text.index("\n\n  createSwappysDigitalDoubleJob:", router_start)
          block = text[router_start:router_end]
          prefix = "  createStudioVfxJob: protectedProcedure\n    .input("
          marker = ")\n    .mutation(async ({ ctx, input }) => {\n"
          if not block.startswith(prefix) or marker not in block or not block.endswith("\n    }),"):
              raise SystemExit("server/vfx-sfx-router.ts: createStudioVfxJob block no longer matches expected structure")
          schema_end = block.index(marker)
          schema_expr = block[len(prefix):schema_end]
          body_start = schema_end + len(marker)
          body = block[body_start:-len("\n    }),")]

          helper_marker = "export const vfxSfxRouter = router({"
          if "async function executeStudioVfxJob(" not in text:
              helper = (
                  f"const createStudioVfxJobInput = {schema_expr};\n"
                  "type CreateStudioVfxJobInput = z.infer<typeof createStudioVfxJobInput>;\n\n"
                  "async function executeStudioVfxJob(ctx: any, input: CreateStudioVfxJobInput) {\n"
                  f"{body}\n"
                  "}\n\n"
              )
              text = text.replace(helper_marker, helper + helper_marker, 1)

          replacement = (
              "  createStudioVfxJob: protectedProcedure\n"
              "    .input(createStudioVfxJobInput)\n"
              "    .mutation(({ ctx, input }) => executeStudioVfxJob(ctx, input)),"
          )
          current_start = text.index("  createStudioVfxJob: protectedProcedure")
          current_end = text.index("\n\n  createSwappysDigitalDoubleJob:", current_start)
          text = text[:current_start] + replacement + text[current_end:]

          old_call = "return (vfxSfxRouter as any).createCaller(ctx).createStudioVfxJob({"
          call_count = text.count(old_call)
          if call_count != 2:
              raise SystemExit(f"server/vfx-sfx-router.ts: expected two recursive caller uses, found {call_count}")
          text = text.replace(old_call, "return executeStudioVfxJob(ctx, {")

          literal_old = 'z.literal(true, { errorMap: () => ({ message: "Explicit consent is required before performing a face transformation." }) })'
          literal_new = 'z.literal(true, { error: "Explicit consent is required before performing a face transformation." })'
          if literal_old not in text and literal_new not in text:
              raise SystemExit("server/vfx-sfx-router.ts: consent literal no longer matches expected source")
          text = text.replace(literal_old, literal_new, 1)
          vfx_path.write_text(text)
          PY
      - name: Commit repairs
        shell: bash
        run: |
          git config user.name "Virelle Hardening Bot"
          git config user.email "actions@users.noreply.github.com"
          git add client/src/pages/UserInventoryPage.tsx server/db.ts server/seo-engine.ts server/vfx-sfx-router.ts
          git diff --cached --check
          if git diff --cached --quiet; then
            echo "Repairs already applied."
            exit 0
          fi
          git commit -m "Fix confirmed TypeScript and VFX router blockers"
          git push origin HEAD:${{ github.head_ref }}

  typecheck-diagnostics:
    if: startsWith(github.head_ref, 'gpt/professional-pipeline-hardening-')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - name: Capture TypeScript diagnostics
        id: typecheck
        shell: bash
        run: |
          set +e
          pnpm check > typecheck-errors.txt 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: hardening-typecheck-errors
          path: typecheck-errors.txt
          retention-days: 1
      - name: Fail when typecheck failed
        if: steps.typecheck.outputs.exit_code != '0'
        run: exit 1
