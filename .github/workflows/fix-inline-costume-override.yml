name: Fix Inline Costume Override

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/scripts/fix_inline_costume_override.py"
      - ".github/workflows/fix-inline-costume-override.yml"

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/mandatory-character-costume-continuity
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply compatibility correction
        run: python .github/scripts/fix_inline_costume_override.py
      - name: Commit product correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Preserve explicit inline costume replacements"
          git push origin HEAD:fix/mandatory-character-costume-continuity
