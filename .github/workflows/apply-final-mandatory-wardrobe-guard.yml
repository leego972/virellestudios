name: Apply Final Mandatory Wardrobe Guard

on:
  push:
    branches:
      - fix/mandatory-character-costume-continuity
    paths:
      - ".github/scripts/apply_final_mandatory_wardrobe_guard.py"
      - ".github/workflows/apply-final-mandatory-wardrobe-guard.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/mandatory-character-costume-continuity
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply mandatory wardrobe guard
        run: python .github/scripts/apply_final_mandatory_wardrobe_guard.py
      - name: Commit guarded product code
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server/_core/sceneGenerationContext.ts server/characterCostumeContinuity.test.ts
          git commit -m "Require structured wardrobe before scene generation"
          git push origin HEAD:fix/mandatory-character-costume-continuity
