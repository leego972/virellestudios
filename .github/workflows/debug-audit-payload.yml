name: Debug Audit Payload

on:
  pull_request:
    branches:
      - main
    paths:
      - ".audit-fix/**"
      - ".github/workflows/debug-audit-payload.yml"
  push:
    branches:
      - audit/stability-2026-07-21
    paths:
      - ".audit-fix/**"
      - ".github/workflows/debug-audit-payload.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: audit/stability-2026-07-21
          fetch-depth: 1
          show-progress: false

      - name: Rebuild diagnostic payload
        shell: bash
        run: |
          set -u
          cat \
            .audit-fix/part-00a \
            .audit-fix/part-00b \
            .audit-fix/part-01 \
            .audit-fix/part-02 \
            .audit-fix/part-03 \
            .audit-fix/part-04 \
            .audit-fix/part-05 \
            .audit-fix/part-06-07 \
            .audit-fix/part-08-09 \
            .audit-fix/part-10-11 \
            .audit-fix/part-12-13 \
            > "$RUNNER_TEMP/remaining.b64"

          {
            wc -c .audit-fix/part-00a .audit-fix/part-00b .audit-fix/part-01 .audit-fix/part-02 .audit-fix/part-03 .audit-fix/part-04 .audit-fix/part-05 .audit-fix/part-06-07 .audit-fix/part-08-09 .audit-fix/part-10-11 .audit-fix/part-12-13 "$RUNNER_TEMP/remaining.b64"
            sha256sum "$RUNNER_TEMP/remaining.b64"
          } > "$RUNNER_TEMP/diagnostic.txt"

          if base64 --decode "$RUNNER_TEMP/remaining.b64" > "$RUNNER_TEMP/remaining.tar.gz"; then
            echo "base64_status=0" >> "$RUNNER_TEMP/diagnostic.txt"
            sha256sum "$RUNNER_TEMP/remaining.tar.gz" >> "$RUNNER_TEMP/diagnostic.txt"
            gzip --test "$RUNNER_TEMP/remaining.tar.gz" && echo "gzip_status=0" >> "$RUNNER_TEMP/diagnostic.txt" || echo "gzip_status=$?" >> "$RUNNER_TEMP/diagnostic.txt"
          else
            echo "base64_status=$?" >> "$RUNNER_TEMP/diagnostic.txt"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: audit-payload-diagnostic
          path: |
            ${{ runner.temp }}/diagnostic.txt
            ${{ runner.temp }}/remaining.b64
            ${{ runner.temp }}/remaining.tar.gz
          if-no-files-found: warn
          retention-days: 1
