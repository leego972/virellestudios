name: App Debug and Parity Gate

on:
  push:
    branches: [main]
    paths:
      - "client/src/pages/DownloadApp.tsx"
      - "desktop/**"
      - "apps/swappys-mobile/**"
      - "server/_core/imageGeneration.ts"
      - "server/_core/swappysValidation.ts"
      - "server/_core/trpc.ts"
      - ".github/workflows/app-debug-pass.yml"
  pull_request:
    paths:
      - "client/src/pages/DownloadApp.tsx"
      - "desktop/**"
      - "apps/swappys-mobile/**"
      - "server/_core/imageGeneration.ts"
      - "server/_core/swappysValidation.ts"
      - "server/_core/trpc.ts"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  web-and-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.4.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm test
      - run: pnpm build
      - run: pnpm audit --audit-level moderate

  swappys-mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/swappys-mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/swappys-mobile/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run doctor

  desktop-linux-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-audit --no-fund
      - run: node --check main.js
      - run: node --check preload.js
      - run: npm run build:linux
