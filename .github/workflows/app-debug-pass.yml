name: App Debug and Parity Gate

on:
  push:
    branches: [main]
    paths:
      - "client/src/pages/DownloadApp.tsx"
      - "client/src/pages/VFXSuite.tsx"
      - "client/src/pages/VirelleBroadcastRender.tsx"
      - "desktop/**"
      - "apps/swappys-mobile/**"
      - "server/_core/imageGeneration.ts"
      - "server/_core/swappysValidation.ts"
      - "server/_core/swappysPolicy.ts"
      - "server/_core/vfxStudioMiddleware.ts"
      - "server/_core/trpc.ts"
      - "server/vfx-sfx-router.ts"
      - "server/virelle-broadcast-render-router.ts"
      - "server/broadcast-worker.ts"
      - "server/studio-render-worker.ts"
      - "scripts/check-swappys-mobile-connection.mjs"
      - "scripts/render-normalize-package.cjs"
      - "Dockerfile"
      - "render.yaml"
      - "start.sh"
      - "gateway.mjs"
      - ".github/workflows/app-debug-pass.yml"
  pull_request:
    paths:
      - "client/src/pages/DownloadApp.tsx"
      - "client/src/pages/VFXSuite.tsx"
      - "client/src/pages/VirelleBroadcastRender.tsx"
      - "desktop/**"
      - "apps/swappys-mobile/**"
      - "server/_core/imageGeneration.ts"
      - "server/_core/swappysValidation.ts"
      - "server/_core/swappysPolicy.ts"
      - "server/_core/vfxStudioMiddleware.ts"
      - "server/_core/trpc.ts"
      - "server/vfx-sfx-router.ts"
      - "server/virelle-broadcast-render-router.ts"
      - "server/broadcast-worker.ts"
      - "server/studio-render-worker.ts"
      - "scripts/check-swappys-mobile-connection.mjs"
      - "scripts/render-normalize-package.cjs"
      - "Dockerfile"
      - "render.yaml"
      - "start.sh"
      - "gateway.mjs"
      - ".github/landing-app-claims-repair.trigger"
      - ".github/workflows/app-debug-pass.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  landing-claims-repair:
    if: github.event_name == 'pull_request' && github.head_ref == 'fix/verified-landing-app-claims-final'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Replace stale app claims
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('client/src/pages/Landing.tsx')
          text = path.read_text()
          text = text.replace(
              'Zap as ZapIcon, Film, Smartphone, Download, Crown,',
              'Zap as ZapIcon, Film, Smartphone, Crown,',
          )
          start_marker = '        {/* ─── 6. Download App Section ─── */}'
          end_marker = '          {/* ─── 6.5 No generic clips. Trust Section ─── */}'
          start = text.index(start_marker)
          end = text.index(end_marker, start)
          replacement = '''        {/* ─── 6. Verified Apps and Install Options ─── */}
        <section className="py-24 px-4 sm:px-6 lg:px-8 border-t border-amber-500/20 bg-black">
          <div className="max-w-4xl mx-auto text-center">
            <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-amber-500/10 border border-amber-500/20 text-amber-400 text-xs font-semibold mb-6">
              <Smartphone className="h-3.5 w-3.5" />
              Verified Apps &amp; Install Options
            </div>
            <h2 className="text-3xl sm:text-4xl font-bold tracking-tight mb-4 text-gold-shimmer">Use Virelle Wherever You Work</h2>
            <p className="text-white/60 mb-10 max-w-2xl mx-auto leading-relaxed">
              The responsive web platform and installable PWA provide the current Virelle experience. Native mobile and desktop buttons are enabled only after the release service verifies a real public listing or installer.
            </p>
            <div className="grid gap-5 md:grid-cols-2 text-left mb-8">
              <div className="rounded-2xl border border-fuchsia-500/25 bg-gradient-to-br from-fuchsia-500/10 to-amber-500/5 p-6">
                <div className="flex items-center gap-3 mb-3">
                  <div className="grid h-11 w-11 place-items-center rounded-xl bg-gradient-to-br from-violet-600 via-fuchsia-500 to-amber-400 font-black text-white">S</div>
                  <div><p className="font-bold text-white">Swappys Preview</p><p className="text-xs text-white/45">Consent-gated AI likeness transformation</p></div>
                </div>
                <p className="text-sm text-white/50 leading-relaxed mb-5">
                  Create a visibly marked high-quality preview, then move the approved result into Virelle for project continuity, final or master quality, studio provenance and secured broadcast outputs.
                </p>
                <Button onClick={() => setLocation('/swappys-broadcast')} className="w-full bg-amber-500 hover:bg-amber-400 text-black font-bold">
                  Open Swappys &amp; Broadcast <ArrowRight className="ml-2 h-4 w-4" />
                </Button>
              </div>
              <div className="rounded-2xl border border-amber-500/20 bg-white/[0.03] p-6">
                <div className="flex items-center gap-3 mb-3">
                  <ShieldCheck className="h-10 w-10 text-emerald-400" />
                  <div><p className="font-bold text-white">Verified Downloads Only</p><p className="text-xs text-white/45">Web · PWA · verified native releases</p></div>
                </div>
                <p className="text-sm text-white/50 leading-relaxed mb-5">
                  The download page checks the production release endpoint before enabling iOS, Android, macOS, Windows or Linux buttons. Missing or stale files remain disabled.
                </p>
                <Button onClick={() => setLocation('/download')} variant="outline" className="w-full border-amber-500/35 text-amber-300 hover:bg-amber-500/10">
                  Check Verified Downloads <ArrowRight className="ml-2 h-4 w-4" />
                </Button>
              </div>
            </div>
            <p className="text-xs text-white/30">One account remains the source of truth. Projects, credits and settings stay connected across supported clients.</p>
          </div>
        </section>


'''
          text = text[:start] + replacement + text[end:]
          old_faq = 'Yes — Virelle Studios for iOS is live on the App Store. The Android app and a native desktop client are in active development. Your subscription works across every platform, and the web app at virelle.life is fully responsive in the meantime.'
          new_faq = 'Virelle works now through the responsive web platform and installable PWA. iOS, Android and desktop downloads are enabled on the Download page only when the server verifies a current public release.'
          if old_faq not in text:
              raise SystemExit('Expected mobile-app FAQ text was not found')
          path.write_text(text.replace(old_faq, new_faq))
          PY
      - name: Commit repaired landing source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/landing-app-claims-repair.trigger
          git rm .github/workflows/landing-app-claims-repair.yml
          git add client/src/pages/Landing.tsx
          git commit -m "Make landing app claims release-verified"
          git push origin HEAD:${{ github.head_ref }}

  web-and-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm test
      - run: pnpm build
      - run: pnpm audit --audit-level moderate
      - name: Validate Swappys connection checker syntax
        run: node --check scripts/check-swappys-mobile-connection.mjs

  swappys-mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/swappys-mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install mobile dependencies
        id: mobile_install
        continue-on-error: true
        run: npm install --legacy-peer-deps --no-audit --no-fund > npm-install.log 2>&1
      - name: Upload mobile install diagnostics
        if: steps.mobile_install.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: swappys-mobile-install-log
          path: apps/swappys-mobile/npm-install.log
          if-no-files-found: error
          retention-days: 3
      - name: Fail when mobile dependency installation failed
        if: steps.mobile_install.outcome == 'failure'
        run: exit 1
      - run: npm run typecheck
      - run: npm run doctor

  desktop-linux-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-audit --no-fund
      - run: node --check main.js
      - run: node --check preload.js
      - run: npm run build:linux

  render-container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Render startup scripts
        run: |
          sh -n start.sh
          node --check gateway.mjs
          node --check scripts/render-normalize-package.cjs
      - name: Build the exact Render Docker image
        run: docker build --tag virelle-render-parity:${{ github.sha }} .
