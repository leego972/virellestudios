name: App Debug and Parity Gate

on:
  push:
    branches: [main]
    paths:
      - "client/src/pages/DownloadApp.tsx"
      - "desktop/**"
      - "apps/swappys-mobile/**"
      - "server/_core/imageGeneration.ts"
      - "server/_core/swappysValidation.ts"
      - "server/_core/trpc.ts"
      - ".github/workflows/app-debug-pass.yml"
  pull_request:
    paths:
      - "client/src/pages/DownloadApp.tsx"
      - "desktop/**"
      - "apps/swappys-mobile/**"
      - "server/_core/imageGeneration.ts"
      - "server/_core/swappysValidation.ts"
      - "server/_core/trpc.ts"
      - ".github/workflows/app-debug-pass.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  web-and-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm test
      - run: pnpm build
      - run: pnpm audit --audit-level moderate

  swappys-mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/swappys-mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install standalone Swappys dependencies
        shell: bash
        run: |
          set +e
          npm install --no-audit --no-fund > npm-install.log 2>&1
          status=$?
          tail -n 160 npm-install.log
          exit $status
      - name: Upload standalone install log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: standalone-swappys-install
          path: apps/swappys-mobile/npm-install.log
          if-no-files-found: error
          retention-days: 3
      - run: npm run typecheck
      - run: npm run doctor

  desktop-linux-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-audit --no-fund
      - run: node --check main.js
      - run: node --check preload.js
      - run: npm run build:linux
