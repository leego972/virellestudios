name: Apply designer commerce integration

on:
  push:
    branches:
      - feature/designer-commerce-shipping-v1
    paths:
      - .github/workflows/apply-designer-commerce-patch.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out integration branch
        uses: actions/checkout@v4
        with:
          ref: feature/designer-commerce-shipping-v1
          fetch-depth: 0
      - name: Apply deterministic patch
        run: python3 scripts/apply-designer-commerce-patch.py
      - name: Commit patched production files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add drizzle/schema.ts server client
          if git diff --cached --quiet; then
            echo "No patch changes to commit"
          else
            git commit -m "Integrate separate designer commerce and shipping"
            git push origin HEAD:feature/designer-commerce-shipping-v1
          fi
