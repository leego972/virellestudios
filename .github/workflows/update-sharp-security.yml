name: Update sharp security dependency

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/update-sharp-security.yml"

permissions:
  contents: write

jobs:
  update-main:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Update sharp and remove obsolete external types
        run: |
          pnpm remove @types/sharp
          pnpm add sharp@0.35.3
      - name: Commit secured dependency baseline
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json pnpm-lock.yaml
          git commit -m "Update sharp to patched 0.35.3"
          git push origin HEAD:main

# Trigger the secured main baseline before merging designer commerce.
