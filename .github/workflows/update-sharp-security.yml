name: Update sharp security dependency

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/update-sharp-security.yml"

permissions:
  contents: write

jobs:
  generate-security-branch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Generate patched manifest and lockfile only
        run: |
          pnpm remove @types/sharp --lockfile-only
          pnpm add sharp@0.35.3 --lockfile-only
      - name: Commit to dedicated security branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B security/sharp-0.35.3
          git add package.json pnpm-lock.yaml
          git commit -m "Update sharp to patched 0.35.3"
          git push --force origin HEAD:security/sharp-0.35.3

# Trigger isolated security branch generation.
