name: Update sharp security dependency

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-security-pr:
    if: github.event.pull_request.head.ref == 'security/sharp-0.35.3'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out security branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Generate patched lockfile
        run: pnpm install --lockfile-only
      - name: Validate secured dependency set
        run: |
          pnpm install --frozen-lockfile
          pnpm check
          pnpm test
          pnpm build
          pnpm audit --audit-level moderate
      - name: Commit generated lockfile
        run: |
          if git diff --quiet -- pnpm-lock.yaml; then
            echo "Lockfile already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "Regenerate lockfile for sharp 0.35.3"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
