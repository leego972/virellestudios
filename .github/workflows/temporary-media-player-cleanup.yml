name: Temporary Media Player Cleanup

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch-media-player:
    if: github.event.pull_request.head.ref == 'feature/production-gap-closure'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/production-gap-closure
          fetch-depth: 0
      - name: Extend deletion to owned scene videos
        shell: python
        run: |
          from pathlib import Path

          path = Path("client/src/components/GlobalMediaPlayerControls.tsx")
          text = path.read_text()

          def replace(old: str, new: str) -> None:
              global text
              if old not in text:
                  raise SystemExit(f"Expected source block not found: {old[:100]!r}")
              text = text.replace(old, new, 1)

          replace(
              """        candidate.isConnected &&
        !!candidate.querySelector<HTMLButtonElement>(
          'button[aria-label=\"Close player\"]',
        ),""",
              """        candidate.isConnected &&
        !!candidate.querySelector<HTMLVideoElement>(\"video\") &&
        !!candidate.querySelector<HTMLButtonElement>(
          'button[aria-label=\"Close player\"]',
        ),""",
          )

          replace(
              """  const isMovieLibrary =
    typeof window !== \"undefined\" &&
    (window.location.pathname === \"/movies\" ||
      window.location.pathname.startsWith(\"/movies/\"));
""",
              """  const isMovieLibrary =
    typeof window !== \"undefined\" &&
    (window.location.pathname === \"/movies\" ||
      window.location.pathname.startsWith(\"/movies/\"));
  const sceneProjectMatch =
    typeof window !== \"undefined\"
      ? window.location.pathname.match(/^\\/projects\\/(\\d+)\\/scenes\\/?$/)
      : null;
  const sceneProjectId = sceneProjectMatch ? Number(sceneProjectMatch[1]) : null;
""",
          )

          replace(
              """  const { data: movies = [] } = trpc.movie.list.useQuery(undefined, {
    enabled: !!playerRoot && isMovieLibrary,
    staleTime: 30_000,
  });
""",
              """  const { data: movies = [] } = trpc.movie.list.useQuery(undefined, {
    enabled: !!playerRoot && isMovieLibrary,
    staleTime: 30_000,
  });
  const { data: projectScenes = [] } = trpc.scene.listByProject.useQuery(
    { projectId: sceneProjectId || 0 },
    {
      enabled: !!playerRoot && !!sceneProjectId,
      staleTime: 30_000,
    },
  );
""",
          )

          replace(
              """  }, [isMovieLibrary, movies, video]);

  const deleteMutation = trpc.movie.delete.useMutation({""",
              """  }, [isMovieLibrary, movies, video]);

  const activeProjectScene = useMemo(() => {
    if (!video || !sceneProjectId) return null;
    const activeUrl = normaliseUrl(video.currentSrc || video.src);
    return (
      projectScenes.find(
        (scene: any) => normaliseUrl(scene.videoUrl) === activeUrl,
      ) ?? null
    );
  }, [projectScenes, sceneProjectId, video]);
  const deletableMedia = activeLibraryMovie || activeProjectScene;

  const deleteMutation = trpc.movie.delete.useMutation({""",
          )

          replace(
              """  const deleteMutation = trpc.movie.delete.useMutation({
    onSuccess: async () => {
      await Promise.all([
        utils.movie.list.invalidate(),
        utils.movie.listGrouped.invalidate(),
      ]);
      setDeleteConfirmOpen(false);
      toast.success(\"Video deleted\");
      const closeButton =
        playerRoot?.querySelector<HTMLButtonElement>(
          'button[aria-label=\"Close player\"]',
        );
      closeButton?.click();
    },
    onError: error =>
      toast.error(error.message || \"Video could not be deleted.\"),
  });
""",
              """  const closeAfterDelete = useCallback(() => {
    setDeleteConfirmOpen(false);
    toast.success(\"Video deleted\");
    playerRoot
      ?.querySelector<HTMLButtonElement>('button[aria-label=\"Close player\"]')
      ?.click();
  }, [playerRoot]);

  const deleteMutation = trpc.movie.delete.useMutation({
    onSuccess: async () => {
      await Promise.all([
        utils.movie.list.invalidate(),
        utils.movie.listGrouped.invalidate(),
      ]);
      closeAfterDelete();
    },
    onError: error =>
      toast.error(error.message || \"Video could not be deleted.\"),
  });
  const deleteSceneVideoMutation = trpc.scene.update.useMutation({
    onSuccess: async () => {
      if (sceneProjectId) {
        await utils.scene.listByProject.invalidate({ projectId: sceneProjectId });
      }
      closeAfterDelete();
    },
    onError: error =>
      toast.error(error.message || \"Scene video could not be deleted.\"),
  });
  const deletionPending =
    deleteMutation.isPending || deleteSceneVideoMutation.isPending;
  const deleteActiveMedia = () => {
    if (activeLibraryMovie) {
      deleteMutation.mutate({ id: activeLibraryMovie.id });
      return;
    }
    if (activeProjectScene) {
      deleteSceneVideoMutation.mutate({
        id: activeProjectScene.id,
        videoUrl: \"\",
        videoJobId: \"\",
        status: \"draft\",
      });
    }
  };
""",
          )

          replace("{activeLibraryMovie && (", "{deletableMedia && (")
          replace(
              """              This permanently removes “{activeLibraryMovie?.title || title}”
              from your movie library. Closing or minimising the player never
              deletes media.""",
              """              This removes “{activeLibraryMovie?.title || activeProjectScene?.title || title}”
              from the current movie library or project scene. Closing or
              minimising the player never deletes media.""",
          )
          replace(
              """            <AlertDialogCancel disabled={deleteMutation.isPending}>
              Cancel
            </AlertDialogCancel>""",
              """            <AlertDialogCancel disabled={deletionPending}>
              Cancel
            </AlertDialogCancel>""",
          )
          replace(
              """              disabled={!activeLibraryMovie || deleteMutation.isPending}
              onClick={event => {
                event.preventDefault();
                if (activeLibraryMovie) {
                  deleteMutation.mutate({ id: activeLibraryMovie.id });
                }
              }}
            >
              {deleteMutation.isPending ? \"Deleting…\" : \"Delete video\"}""",
              """              disabled={!deletableMedia || deletionPending}
              onClick={event => {
                event.preventDefault();
                deleteActiveMedia();
              }}
            >
              {deletionPending ? \"Deleting…\" : \"Delete video\"}""",
          )

          path.write_text(text)
      - name: Commit cleanup
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "Virelle CI Cleanup"
          git config user.email "actions@users.noreply.github.com"
          git add client/src/components/GlobalMediaPlayerControls.tsx
          git commit -m "Support safe deletion of project scene videos"
          git push origin HEAD:feature/production-gap-closure
