name: Apply Mandatory Character Wardrobe

on:
  push:
    branches:
      - fix/mandatory-character-wardrobe-enforcement
    paths:
      - ".github/scripts/apply_mandatory_character_wardrobe.py"
      - ".github/workflows/apply-mandatory-character-wardrobe.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/mandatory-character-wardrobe-enforcement
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply mandatory wardrobe enforcement
        run: python .github/scripts/apply_mandatory_character_wardrobe.py
      - name: Commit product changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server/_core/sceneGenerationContext.ts server/characterCostumeContinuity.test.ts
          git commit -m "Require character wardrobe before generation"
          git push origin HEAD:fix/mandatory-character-wardrobe-enforcement
