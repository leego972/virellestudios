name: Apply Designer Public Profile Safety

on:
  push:
    branches:
      - designer/connected-onboarding-listings-2026-07-21
    paths:
      - ".github/workflows/apply-designer-public-profile-safety.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: designer/connected-onboarding-listings-2026-07-21
          fetch-depth: 0
          persist-credentials: true

      - name: Sanitize public designer responses
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("server/wardrobe-marketplace-router-legacy.ts")
          source = path.read_text(encoding="utf-8")

          replacements = [
              (
                  'import * as db from "./db";\n',
                  'import * as db from "./db";\nimport { toPublicDesignerProfile } from "./designer-public-profile";\n',
              ),
              (
                  '        return (rows as unknown as any[]);\n',
                  '        return (rows as unknown as any[]).map(toPublicDesignerProfile);\n',
              ),
              (
                  '          return { profile, collections: deduped };\n',
                  '          return { profile: toPublicDesignerProfile(profile), collections: deduped };\n',
              ),
              (
                  '        return { collection: col, designer, items: leasable };\n',
                  '        return {\n          collection: col,\n          designer: designer ? toPublicDesignerProfile(designer) : null,\n          items: leasable,\n        };\n',
              ),
          ]

          for old, new in replacements:
              count = source.count(old)
              if count != 1:
                  raise SystemExit(f"Expected one occurrence, found {count}: {old!r}")
              source = source.replace(old, new, 1)

          path.write_text(source, encoding="utf-8")
          PY

      - name: Remove temporary workflow and commit
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/apply-designer-public-profile-safety.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Sanitize public Designer marketplace profiles"
          git push origin HEAD:designer/connected-onboarding-listings-2026-07-21
