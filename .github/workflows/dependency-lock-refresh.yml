name: Dependency lock refresh

on:
  pull_request:
    branches: [main]
    paths:
      - package.json
      - pnpm-lock.yaml
      - .github/workflows/dependency-lock-refresh.yml

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Regenerate lockfile
        run: pnpm install --lockfile-only --no-frozen-lockfile
      - name: Verify patched dependency graph
        run: |
          pnpm list axios brace-expansion --depth 10
          pnpm audit --audit-level high
      - name: Upload regenerated lockfile
        uses: actions/upload-artifact@v4
        with:
          name: patched-pnpm-lock
          path: pnpm-lock.yaml
          retention-days: 1
