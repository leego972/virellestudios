name: Final Lamalo formatting pass

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/lamalo-final-format.yml"

permissions:
  contents: write

jobs:
  format-test-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Format repaired sources
        run: pnpm exec prettier --write server/lamalo-gifts-router.ts client/src/components/WelcomeOutfitPicker.tsx client/src/pages/Home.tsx scripts/check-lamalo-welcome-contract.mjs server/lamalo-seed.ts .github/workflows/lamalo-wardrobe-integrity.yml
      - name: Lamalo welcome contract
        run: node scripts/check-lamalo-welcome-contract.mjs
      - name: TypeScript check
        run: pnpm check
      - name: Wardrobe regression tests
        run: pnpm vitest run server/wardrobePurchaseFulfillment.test.ts server/wardrobeContinuity.test.ts server/sceneWardrobeContinuity.test.ts
      - name: Render production build
        run: pnpm build
      - name: Commit verified formatting
        shell: bash
        run: |
          git config user.name "Virelle Repair Bot"
          git config user.email "actions@users.noreply.github.com"
          git add server/lamalo-gifts-router.ts client/src/components/WelcomeOutfitPicker.tsx client/src/pages/Home.tsx scripts/check-lamalo-welcome-contract.mjs server/lamalo-seed.ts .github/workflows/lamalo-wardrobe-integrity.yml
          if git diff --cached --quiet; then
            echo "No formatting changes required"
            exit 0
          fi
          git commit -m "Format verified Lamalo welcome repair"
          git push origin HEAD:${{ github.head_ref }}
