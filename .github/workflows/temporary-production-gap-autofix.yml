name: Temporary Production Gap Autofix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch-known-diagnostics:
    if: github.event.pull_request.head.ref == 'feature/production-gap-closure'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/production-gap-closure
          fetch-depth: 0
      - name: Apply exact compiler and stability fixes
        shell: python
        run: |
          from pathlib import Path

          def replace(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  raise SystemExit(f"Expected text not found in {path}: {old[:80]!r}")
              file.write_text(text.replace(old, new))

          replace(
              "client/src/pages/PitchDeckPage.tsx",
              "FilePresentation",
              "Presentation",
          )
          replace(
              "client/src/pages/PitchDeckPage.tsx",
              "const blobBytes = bytes.buffer.slice(bytes.byteOffset, bytes.byteOffset + bytes.byteLength);",
              "const blobBytes = Uint8Array.from(bytes).buffer;",
          )
          replace(
              "client/src/lib/pitchDeckExport.ts",
              "  budgetEstimate?: string;\n  productionPlan?: string;",
              "  budgetEstimate?: unknown;\n  productionPlan?: unknown;",
          )
          replace(
              "client/src/lib/pitchDeckExport.ts",
              "new Blob([pdfBytes], { type: \"application/pdf\" })",
              "new Blob([Uint8Array.from(pdfBytes).buffer], { type: \"application/pdf\" })",
          )
          replace(
              "client/src/lib/pitchDeckExport.ts",
              "new Blob([zip], { type: \"application/vnd.openxmlformats-officedocument.presentationml.presentation\" })",
              "new Blob([Uint8Array.from(zip).buffer], { type: \"application/vnd.openxmlformats-officedocument.presentationml.presentation\" })",
          )
          replace(
              "client/src/components/TimelineEditSuiteOverlay.tsx",
              "  directorNote?: string | null;",
              "  directorNote?: string;",
          )
          replace(
              "client/src/components/TimelineEditSuiteOverlay.tsx",
              """  const saveClipField = (clip: CutScene, changes: Partial<Pick<CutScene, \"trimIn\" | \"trimOut\" | \"transitionType\" | \"transitionDuration\" | \"directorNote\" | \"isIncluded\">>) => {
    const rawDuration = Math.max(0, Number(clip.scene?.duration || 0));
    const trimIn = changes.trimIn ?? clip.trimIn;
    const trimOut = changes.trimOut ?? clip.trimOut;
    if (trimIn < 0 || trimOut < 0 || trimIn + trimOut >= rawDuration) {
      toast.error(\"Trim values must leave at least one second of usable media.\");
      return;
    }
    updateClipMutation.mutate({ cutSceneId: clip.id, ...changes });
  };""",
              """  const saveClipField = (clip: CutScene, changes: Partial<Pick<CutScene, \"trimIn\" | \"trimOut\" | \"transitionType\" | \"transitionDuration\" | \"isIncluded\">>) => {
    if (changes.trimIn !== undefined || changes.trimOut !== undefined) {
      const rawDuration = Math.max(0, Number(clip.scene?.duration || 0));
      const trimIn = changes.trimIn ?? clip.trimIn;
      const trimOut = changes.trimOut ?? clip.trimOut;
      if (rawDuration <= 0) {
        toast.error(\"Add generated or uploaded video media before trimming this clip.\");
        return;
      }
      if (trimIn < 0 || trimOut < 0 || trimIn + trimOut >= rawDuration) {
        toast.error(\"Trim values must leave at least one second of usable media.\");
        return;
      }
    }
    updateClipMutation.mutate({ cutSceneId: clip.id, ...changes });
  };""",
          )
          replace(
              "client/src/components/GlobalMediaPlayerControls.tsx",
              """        candidate.isConnected &&
        !!candidate.querySelector<HTMLButtonElement>(
          'button[aria-label=\"Close player\"]',
        ),""",
              """        candidate.isConnected &&
        !!candidate.querySelector<HTMLVideoElement>(\"video\") &&
        !!candidate.querySelector<HTMLButtonElement>(
          'button[aria-label=\"Close player\"]',
        ),""",
          )
          replace(
              "client/src/components/LandingStrategicPositioningGuard.tsx",
              """    if (!text.includes(\"OpenAI Sora\") || !text.includes(\"Runway Gen-4.5\") || !text.includes(\"Suno v4\")) continue;
    if (container.children.length < 4) continue;""",
              """    if (!text.includes(\"OpenAI Sora\") || !text.includes(\"Runway Gen-4.5\") || !text.includes(\"Suno v4\")) continue;
    const directChildren = Array.from(container.children);
    if (directChildren.length < 6 || !directChildren.every(child => child.tagName === \"SPAN\")) continue;""",
          )
      - name: Commit fixes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes required"
            exit 0
          fi
          git config user.name "Virelle CI Autofix"
          git config user.email "actions@users.noreply.github.com"
          git add client/src/pages/PitchDeckPage.tsx client/src/lib/pitchDeckExport.ts client/src/components/TimelineEditSuiteOverlay.tsx client/src/components/GlobalMediaPlayerControls.tsx client/src/components/LandingStrategicPositioningGuard.tsx
          git commit -m "Fix production gap compiler and stability issues"
          git push origin HEAD:feature/production-gap-closure
