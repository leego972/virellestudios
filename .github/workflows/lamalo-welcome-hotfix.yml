name: Apply Lamalo welcome hotfix

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/lamalo-welcome-hotfix.yml"

permissions:
  contents: write

jobs:
  patch-test-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Apply guarded source patches
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected exactly one match, found {count}")
              return text.replace(old, new, 1)

          # ── Client: never query while logged out or while the studio opener is active.
          path = Path("client/src/components/WelcomeOutfitPicker.tsx")
          text = path.read_text()
          text = replace_once(text, 'import { useState } from "react";', 'import { useEffect, useState } from "react";', "welcome React import")
          text = replace_once(text, 'import { trpc } from "@/lib/trpc";\n', 'import { trpc } from "@/lib/trpc";\nimport { useAuth } from "@/_core/hooks/useAuth";\n', "welcome auth import")
          text = replace_once(
              text,
              'export default function WelcomeOutfitPicker() {\n',
              '''function isStudioOpenerActive(): boolean {
            if (typeof window === "undefined" || typeof document === "undefined") return false;
            if (new URLSearchParams(window.location.search).get("opener") === "1") return true;

            return Array.from(document.body.children).some(node => {
              if (!(node instanceof HTMLElement)) return false;
              const style = window.getComputedStyle(node);
              const zIndex = Number.parseInt(style.zIndex || "0", 10);
              return style.position === "fixed" && zIndex >= 9000;
            });
          }

          export default function WelcomeOutfitPicker() {
            const { isAuthenticated, loading: authLoading } = useAuth();
            const utils = trpc.useUtils();
            const [openerReady, setOpenerReady] = useState(() => !isStudioOpenerActive());

            useEffect(() => {
              if (!isAuthenticated) {
                setOpenerReady(false);
                return;
              }

              let sawOpener = isStudioOpenerActive();
              if (!sawOpener) {
                setOpenerReady(true);
                return;
              }

              setOpenerReady(false);
              const timer = window.setInterval(() => {
                const active = isStudioOpenerActive();
                sawOpener ||= active;
                if (sawOpener && !active) {
                  window.clearInterval(timer);
                  window.setTimeout(() => setOpenerReady(true), 150);
                }
              }, 100);

              return () => window.clearInterval(timer);
            }, [isAuthenticated]);
          ''',
              "welcome opener gate",
          )
          text = replace_once(
              text,
              '''  const { data: gift } =
              (trpc as any).lamaloGifts?.hasClaimedGift?.useQuery?.() ?? {};
          ''',
              '''  const { data: gift } =
              (trpc as any).lamaloGifts?.hasClaimedGift?.useQuery?.(
                undefined,
                { enabled: Boolean(isAuthenticated && !authLoading && openerReady) },
              ) ?? {};
          ''',
              "welcome eligibility query gate",
          )
          text = replace_once(
              text,
              '{ enabled: Boolean(gift?.eligible && !gift?.claimed) },',
              '{ enabled: Boolean(isAuthenticated && openerReady && gift?.eligible && !gift?.claimed) },',
              "welcome outfit query gate",
          )
          text = replace_once(
              text,
              '''    onSuccess: () => {
                toast.success(
                  "Your 2 free Lamalo virtual outfits are now in your wardrobe inventory.",
                );
                setOpen(false);
              },
          ''',
              '''    onSuccess: async () => {
                toast.success(
                  "Your 2 free Lamalo virtual outfits are now in your wardrobe inventory.",
                );
                setSelected([]);
                setOpen(false);
                await Promise.allSettled([
                  (utils as any).lamaloGifts?.hasClaimedGift?.invalidate?.(),
                  (utils as any).wardrobeMarket?.leasing?.myInventory?.invalidate?.(),
                ]);
              },
          ''',
              "welcome mutation invalidation",
          )
          text = replace_once(text, '  const [open, setOpen] = useState(true);\n', '  const [open, setOpen] = useState(false);\n\n  useEffect(() => {\n    if (openerReady && gift?.eligible && !gift?.claimed) setOpen(true);\n  }, [gift?.claimed, gift?.eligible, openerReady]);\n', "welcome open state")
          text = replace_once(
              text,
              '  if (!gift?.eligible || gift?.claimed) return null;\n',
              '  if (authLoading || !isAuthenticated || !openerReady || !gift?.eligible || gift?.claimed) return null;\n',
              "welcome render gate",
          )
          path.write_text(text)

          # ── Server: canonical aliases, active-only claims, and serialized atomic fulfilment.
          path = Path("server/lamalo-gifts-router.ts")
          text = path.read_text()
          text = replace_once(text, 'import { eq, and, inArray } from "drizzle-orm";', 'import { eq, and, asc, inArray, sql } from "drizzle-orm";', "gift drizzle imports")
          text = replace_once(text, 'const LAMALO_BRAND_NAME = "Lamalo Fashion";\n', 'const LAMALO_BRAND_NAME = "Lamalo Fashion";\nconst LAMALO_BRAND_NAMES = [LAMALO_BRAND_NAME, "Lamalo Fashions", "Lamalo"] as const;\n', "gift brand aliases")
          text = replace_once(
              text,
              '''    .where(eq(designerProfiles.brandName, LAMALO_BRAND_NAME))
              .limit(1);
          ''',
              '''    .where(inArray(designerProfiles.brandName, [...LAMALO_BRAND_NAMES]))
              .orderBy(asc(designerProfiles.id))
              .limit(1);
          ''',
              "gift profile lookup",
          )
          text = text.replace(
              'eq(wardrobeLeases.amountPaidAud, 0),\n',
              'eq(wardrobeLeases.amountPaidAud, 0),\n            eq(wardrobeLeases.status, "active"),\n',
          )

          mutation_pattern = re.compile(r'''    \.mutation\(async \(\{ ctx, input \}\) => \{.*?\n    \}\),\n\}\);\n?$''', re.S)
          mutation_replacement = '''    .mutation(async ({ ctx, input }) => {
              const db = await getDb();
              if (!db) throw new TRPCError({ code: "INTERNAL_SERVER_ERROR", message: "Database unavailable." });

              const designer = await db
                .select({ id: designerProfiles.id })
                .from(designerProfiles)
                .where(eq(designerProfiles.userId, ctx.user.id))
                .limit(1);
              if (designer.length > 0) {
                throw new TRPCError({
                  code: "FORBIDDEN",
                  message: "Designer accounts are not eligible.",
                });
              }

              const lamaloId = await requireLamaloProfileId(db);
              const selectedIds = [input.itemId1, input.itemId2];

              const result = await db.transaction(async tx => {
                // Lock the member row so two browser requests cannot claim twice concurrently.
                await tx.execute(sql`SELECT id FROM users WHERE id = ${ctx.user.id} FOR UPDATE`);

                const existing = await tx
                  .select({ id: wardrobeLeases.id, wardrobeItemId: wardrobeLeases.wardrobeItemId })
                  .from(wardrobeLeases)
                  .where(
                    and(
                      eq(wardrobeLeases.userId, ctx.user.id),
                      eq(wardrobeLeases.designerProfileId, lamaloId),
                      eq(wardrobeLeases.amountPaidAud, 0),
                      eq(wardrobeLeases.status, "active"),
                    ),
                  );
                if (existing.length >= 2) {
                  throw new TRPCError({
                    code: "CONFLICT",
                    message: "Welcome gift already claimed.",
                  });
                }

                const items = await tx
                  .select({ id: wardrobeItems.id })
                  .from(wardrobeItems)
                  .where(
                    and(
                      inArray(wardrobeItems.id, selectedIds),
                      eq(wardrobeItems.designerProfileId, lamaloId),
                      eq(wardrobeItems.visibility, "public"),
                      eq(wardrobeItems.status, "active"),
                    ),
                  );
                if (items.length !== 2) {
                  throw new TRPCError({
                    code: "BAD_REQUEST",
                    message: "Invalid Lamalo outfits selected.",
                  });
                }

                const existingItemIds = new Set(
                  existing
                    .map(row => row.wardrobeItemId)
                    .filter((id): id is number => typeof id === "number"),
                );
                const remainingSlots = 2 - existing.length;
                const itemIdsToInsert = selectedIds
                  .filter(id => !existingItemIds.has(id))
                  .slice(0, remainingSlots);

                if (itemIdsToInsert.length !== remainingSlots) {
                  throw new TRPCError({
                    code: "CONFLICT",
                    message: "Choose outfits that are not already in your welcome gift.",
                  });
                }

                if (itemIdsToInsert.length > 0) {
                  await tx.insert(wardrobeLeases).values(
                    itemIdsToInsert.map(wardrobeItemId => ({
                      userId: ctx.user.id,
                      designerProfileId: lamaloId,
                      wardrobeItemId,
                      leaseType: "item",
                      amountPaidAud: 0,
                      designerAmountAud: 0,
                      platformFeeAud: 0,
                      status: "active",
                    })),
                  );
                }

                return { added: itemIdsToInsert.length, total: existing.length + itemIdsToInsert.length };
              });

              return {
                success: true,
                added: result.added,
                total: result.total,
                message: "Welcome outfits unlocked! They are available in your wardrobe inventory.",
              };
            }),
          });
          '''
          text, count = mutation_pattern.subn(mutation_replacement, text)
          if count != 1:
              raise SystemExit(f"gift atomic mutation: expected one match, found {count}")
          path.write_text(text)

          # ── Seed: scope every repair to Lamalo and make item upserts truly idempotent.
          path = Path("server/lamalo-seed.ts")
          text = path.read_text()
          text = replace_once(
              text,
              'import { designerProfiles, designerCollections, wardrobeItems } from "../drizzle/schema";',
              'import { designerProfiles, designerCollections, wardrobeItems, wardrobeLeases } from "../drizzle/schema";',
              "seed lease import",
          )
          text = text.replace('/** 15 % off when buying the whole collection */', '/** 10 % off when buying the whole collection */')
          text = text.replace('Railway deployments where autoMigrate ALTER TABLE may', 'Render deployments where autoMigrate ALTER TABLE may')
          text = replace_once(
              text,
              '''      WHERE collectionId IS NOT NULL
                AND (retailPriceAud IS NULL OR retailPriceAud < 100)
          ''',
              '''      WHERE designerProfileId IN (
                SELECT id FROM designerProfiles WHERE brandName = 'Lamalo Fashion'
              )
                AND (retailPriceAud IS NULL OR retailPriceAud < 100)
          ''',
              "seed initial price scope",
          )
          text = replace_once(
              text,
              '''    await db.update(wardrobeItems)
                .set({ designerProfileId: canonicalId })
                .where(inArray(wardrobeItems.designerProfileId, dupeIds));
              // Delete the empty duplicate shells
          ''',
              '''    await db.update(wardrobeItems)
                .set({ designerProfileId: canonicalId })
                .where(inArray(wardrobeItems.designerProfileId, dupeIds));
              await db.update(wardrobeLeases)
                .set({ designerProfileId: canonicalId })
                .where(inArray(wardrobeLeases.designerProfileId, dupeIds));
              // Delete the empty duplicate shells
          ''',
              "seed lease reparent",
          )

          old_loop = '''    for (const item of col.items) {
                // Use raw SQL to avoid Drizzle double-encoding JSON columns
                // Use Pollinations URL — /lamalo/ paths 404 in production
                  const imgUrl = (item.primaryImageUrl && !item.primaryImageUrl.startsWith('/lamalo/'))
                    ? item.primaryImageUrl
                    : pollinationsUrl(item.referencePrompt ?? `${item.name} ${item.category} fashion item`);
                  const imgUrlsJson = JSON.stringify([imgUrl]);
                  await db.execute(sql`
                    INSERT IGNORE INTO wardrobeItems
                      (collectionId, userId, designerProfileId, name, description, category,
                       subcategory, wardrobeType, genderFit, sizeRange, era,
                       colors, materials, styleTags, primaryImageUrl, imageUrls, referencePrompt,
                       brandPlacementAllowed, shopfrontPlacementAllowed, characterWardrobeAllowed,
                       costumeUseAllowed, commercialUseAllowed, licenseType, visibility, status,
                       retailPriceAud, leasePriceAud)
                    VALUES
                      (${collectionId}, ${userId}, ${designerProfileId},
                       ${item.name}, ${item.description}, ${item.category},
                       ${item.subcategory ?? null}, ${"fashion"}, ${item.genderFit ?? null},
                       ${item.sizeRange ?? "XS-XXL"}, ${"Contemporary 2026"},
                       ${item.colors ? JSON.stringify(item.colors) : null},
                       ${item.materials ? JSON.stringify(item.materials) : null},
                       ${item.styleTags ? JSON.stringify(item.styleTags) : null},
                       ${imgUrl}, ${imgUrlsJson}, ${item.referencePrompt ?? null},
                       ${0}, ${1}, ${1}, ${1}, ${1},
                       ${"full_license"}, ${"public"}, ${"active"},
                       ${item.retailPriceAud ?? null}, ${null})
                  `);
                  totalItems++;
              }
          '''
          new_loop = '''    for (const item of col.items) {
                // A collection/name pair is the stable catalogue identity. INSERT IGNORE
                // was not idempotent because production has no matching UNIQUE key.
                const existingItem = await db
                  .select({ id: wardrobeItems.id })
                  .from(wardrobeItems)
                  .where(
                    and(
                      eq(wardrobeItems.collectionId, collectionId),
                      eq(wardrobeItems.name, item.name),
                    ),
                  )
                  .orderBy(asc(wardrobeItems.id))
                  .limit(1);

                const imgUrl = (item.primaryImageUrl && !item.primaryImageUrl.startsWith('/lamalo/'))
                  ? item.primaryImageUrl
                  : pollinationsUrl(item.referencePrompt ?? `${item.name} ${item.category} fashion item`);
                const imgUrlsJson = JSON.stringify([imgUrl]);
                const colorsJson = item.colors ? JSON.stringify(item.colors) : null;
                const materialsJson = item.materials ? JSON.stringify(item.materials) : null;
                const styleTagsJson = item.styleTags ? JSON.stringify(item.styleTags) : null;

                if (existingItem.length > 0) {
                  await db.execute(sql`
                    UPDATE wardrobeItems
                    SET userId = ${userId},
                        designerProfileId = ${designerProfileId},
                        description = ${item.description},
                        category = ${item.category},
                        subcategory = ${item.subcategory ?? null},
                        wardrobeType = ${"fashion"},
                        genderFit = ${item.genderFit ?? null},
                        sizeRange = ${item.sizeRange ?? "XS-XXL"},
                        era = ${"Contemporary 2026"},
                        colors = ${colorsJson},
                        materials = ${materialsJson},
                        styleTags = ${styleTagsJson},
                        primaryImageUrl = ${imgUrl},
                        imageUrls = ${imgUrlsJson},
                        referencePrompt = ${item.referencePrompt ?? null},
                        shopfrontPlacementAllowed = ${1},
                        characterWardrobeAllowed = ${1},
                        costumeUseAllowed = ${1},
                        commercialUseAllowed = ${1},
                        licenseType = ${"full_license"},
                        visibility = ${"public"},
                        status = ${"active"},
                        retailPriceAud = ${item.retailPriceAud ?? null},
                        leasePriceAud = ${null}
                    WHERE id = ${existingItem[0].id}
                  `);
                } else {
                  await db.execute(sql`
                    INSERT INTO wardrobeItems
                      (collectionId, userId, designerProfileId, name, description, category,
                       subcategory, wardrobeType, genderFit, sizeRange, era,
                       colors, materials, styleTags, primaryImageUrl, imageUrls, referencePrompt,
                       brandPlacementAllowed, shopfrontPlacementAllowed, characterWardrobeAllowed,
                       costumeUseAllowed, commercialUseAllowed, licenseType, visibility, status,
                       retailPriceAud, leasePriceAud)
                    VALUES
                      (${collectionId}, ${userId}, ${designerProfileId},
                       ${item.name}, ${item.description}, ${item.category},
                       ${item.subcategory ?? null}, ${"fashion"}, ${item.genderFit ?? null},
                       ${item.sizeRange ?? "XS-XXL"}, ${"Contemporary 2026"},
                       ${colorsJson}, ${materialsJson}, ${styleTagsJson},
                       ${imgUrl}, ${imgUrlsJson}, ${item.referencePrompt ?? null},
                       ${0}, ${1}, ${1}, ${1}, ${1},
                       ${"full_license"}, ${"public"}, ${"active"},
                       ${item.retailPriceAud ?? null}, ${null})
                  `);
                }
                totalItems++;
              }
          '''
          text = replace_once(text, old_loop, new_loop, "seed item upsert")
          text = replace_once(
              text,
              '''        WHERE collectionId IS NOT NULL
                  AND (
          ''',
              '''        WHERE designerProfileId = ${designerProfileId}
                  AND (
          ''',
              "seed image repair scope",
          )
          text = replace_once(
              text,
              '        WHERE collectionId IS NOT NULL AND retailPriceAud IS NULL\n',
              '        WHERE designerProfileId = ${designerProfileId} AND retailPriceAud IS NULL\n',
              "seed final price scope",
          )
          path.write_text(text)

          # ── Persistent contract checker.
          checker = Path("scripts/check-lamalo-welcome-contract.mjs")
          checker.write_text(r'''import fs from "node:fs";
          import assert from "node:assert/strict";

          const gifts = fs.readFileSync("server/lamalo-gifts-router.ts", "utf8");
          const seed = fs.readFileSync("server/lamalo-seed.ts", "utf8");
          const picker = fs.readFileSync("client/src/components/WelcomeOutfitPicker.tsx", "utf8");

          const picksBlock = gifts.match(/const STARTER_PICKS = \[([\s\S]*?)\] as const;/)?.[1] ?? "";
          const picks = [...picksBlock.matchAll(/"([^"]+)"/g)].map(match => match[1]);
          assert.equal(picks.length, 10, "welcome gift must expose exactly ten curated picks");
          assert.equal(new Set(picks).size, 10, "welcome gift picks must be unique");
          for (const pick of picks) {
            const [base, colour] = pick.split(" — ");
            assert.ok(base && colour, `invalid colour-qualified starter pick: ${pick}`);
            assert.ok(seed.includes(`name:"${base}"`), `starter base item is missing from Lamalo seed: ${base}`);
            assert.ok(seed.includes(`"${colour}"`), `starter colour is missing from Lamalo seed palettes: ${colour}`);
          }

          assert.ok(gifts.includes("db.transaction"), "welcome claim must be transactional");
          assert.ok(gifts.includes("FOR UPDATE"), "welcome claim must serialize concurrent requests");
          assert.ok(gifts.includes('eq(wardrobeLeases.status, "active")'), "claim checks must ignore inactive leases");
          assert.ok(picker.includes("isStudioOpenerActive"), "picker must wait for the studio opener");
          assert.ok(picker.includes("isAuthenticated && !authLoading && openerReady"), "picker must not call protected APIs while logged out");
          assert.ok(!seed.includes("INSERT IGNORE INTO wardrobeItems"), "Lamalo item seeding must use an explicit idempotent upsert");
          assert.ok(!/WHERE collectionId IS NOT NULL\s+AND \(retailPriceAud/.test(seed), "price repair must not alter other designers' rows");
          assert.ok(seed.includes("WHERE designerProfileId = ${designerProfileId}"), "catalogue repair SQL must be scoped to Lamalo");

          console.log("Lamalo welcome contract verified: 10 picks, gated UI, atomic claim, scoped idempotent seed.");
          ''')

          # Expand the standing CI gate to cover this contract.
          path = Path(".github/workflows/lamalo-wardrobe-integrity.yml")
          text = path.read_text()
          for anchor in ['      - "server/_core/lamaloCatalogIntegrity.ts"\n']:
              replacement = anchor + '      - "server/lamalo-gifts-router.ts"\n      - "server/lamalo-seed.ts"\n      - "client/src/components/WelcomeOutfitPicker.tsx"\n      - "scripts/check-lamalo-welcome-contract.mjs"\n'
              if text.count(anchor) != 2:
                  raise SystemExit(f"integrity workflow paths: expected two anchors, found {text.count(anchor)}")
              text = text.replace(anchor, replacement)
          text = replace_once(
              text,
              '      - name: TypeScript check\n        run: pnpm check\n',
              '      - name: Lamalo welcome contract\n        run: node scripts/check-lamalo-welcome-contract.mjs\n      - name: TypeScript check\n        run: pnpm check\n',
              "integrity contract step",
          )
          path.write_text(text)
          PY

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify Lamalo welcome contract
        run: node scripts/check-lamalo-welcome-contract.mjs
      - name: TypeScript check
        run: pnpm check
      - name: Wardrobe regression tests
        run: pnpm vitest run server/wardrobePurchaseFulfillment.test.ts server/wardrobeContinuity.test.ts server/sceneWardrobeContinuity.test.ts
      - name: Production build used by Render
        run: pnpm build

      - name: Commit verified hotfix
        shell: bash
        run: |
          git config user.name "Virelle Repair Bot"
          git config user.email "actions@users.noreply.github.com"
          git add client/src/components/WelcomeOutfitPicker.tsx server/lamalo-gifts-router.ts server/lamalo-seed.ts scripts/check-lamalo-welcome-contract.mjs .github/workflows/lamalo-wardrobe-integrity.yml
          git commit -m "Harden Lamalo welcome gift and catalogue contract"
          git push origin HEAD:main
