name: Accept existing FDX hardening

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'audit/quality-security-pass-20260721'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Update migration completed-state check
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/deep-quality-security-audit.yml')
          value = path.read_text()
          old = '          elif new not in value: raise RuntimeError("FDX decoder")'
          new = '          elif "Decode exactly one XML entity layer" not in value and new not in value: raise RuntimeError("FDX decoder")'
          if old not in value and new not in value:
              raise SystemExit('FDX migration check anchor missing')
          path.write_text(value.replace(old, new, 1))
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/deep-quality-security-audit.yml
          git commit -m "Accept existing single-pass FDX decoder hardening"
          git pull --rebase origin "${{ github.head_ref }}"
          git push origin "HEAD:${{ github.head_ref }}"
