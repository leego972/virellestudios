name: Add wardrobe inventory CTA

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch-and-verify:
    if: github.head_ref == 'fix/wardrobe-inventory-cta-20260722'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Add direct inventory navigation
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          path = Path('client/src/pages/WardrobeMarketplacePage.tsx')
          value = path.read_text()
          old = '''            <Button
              onClick={() => setShowCustomOrder(true)}
              className="bg-amber-500 hover:bg-amber-400 text-black font-black h-12 px-6 shrink-0 w-full sm:w-auto"
            >
              <Wand2 className="h-4 w-4 mr-2" /> Order Custom Item — A$4.99
            </Button>'''
          new = old + '''
            <Button
              variant="outline"
              onClick={() => setLocation("/wardrobe-inventory")}
              className="border-amber-500/30 text-amber-300 hover:bg-amber-500/10 h-12 px-6 shrink-0 w-full sm:w-auto"
            >
              <Package className="h-4 w-4 mr-2" /> My Wardrobe Inventory
            </Button>'''
          if new not in value:
            if value.count(old) != 1:
              raise SystemExit(f'expected one marketplace CTA anchor, found {value.count(old)}')
            path.write_text(value.replace(old, new, 1))
          PY
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit
      - run: pnpm check
      - run: pnpm test
      - run: pnpm build
        env:
          NODE_ENV: production
          VITE_APP_ID: inventory-cta-stub
          VITE_SENTRY_DSN: ""
      - name: Commit verified CTA
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add client/src/pages/WardrobeMarketplacePage.tsx
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Connect Lamalo marketplace to wardrobe inventory"
          git push origin "HEAD:${{ github.head_ref }}"
