name: Apply Director Mask Identity

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/apply-director-mask-identity.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Replace generic Director Assistant identity icons with mask
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("client/src/components/DirectorChat.tsx")
          source = path.read_text(encoding="utf-8")

          source = source.replace("  MessageSquare,\n", "", 1)

          header_old = '''            <div className="size-8 rounded-full bg-gradient-to-br from-amber-500 to-amber-600 flex items-center justify-center shrink-0">
              <Sparkles className="size-4 text-black" />
            </div>'''
          header_new = '''            <div className="size-9 shrink-0 overflow-hidden rounded-full border border-amber-500/50 bg-[#07070e] shadow-[0_0_12px_rgba(245,158,11,0.24)]">
              <img
                src="/virelle-face.png"
                alt="Virelle Director mask"
                className="h-full w-full object-contain p-0.5"
                draggable={false}
              />
            </div>'''
          if source.count(header_old) != 1:
            raise SystemExit(f"Director header icon block count: {source.count(header_old)}")
          source = source.replace(header_old, header_new, 1)

          empty_old = '''              <div className="size-16 rounded-full bg-gradient-to-br from-amber-500/20 to-amber-600/10 flex items-center justify-center">
                <MessageSquare className="size-8 text-amber-500/60" />
              </div>'''
          empty_new = '''              <div className="relative size-24 shrink-0 overflow-hidden rounded-full border border-amber-500/35 bg-[#07070e] shadow-[0_0_28px_rgba(245,158,11,0.22)]">
                <img
                  src="/virelle-face.png"
                  alt="Virelle Director mask"
                  className="h-full w-full object-contain p-1"
                  draggable={false}
                />
              </div>'''
          if source.count(empty_old) != 1:
            raise SystemExit(f"Director empty-state icon block count: {source.count(empty_old)}")
          source = source.replace(empty_old, empty_new, 1)

          loading_old = '''                      <div className="size-7 shrink-0 rounded-full bg-gradient-to-br from-amber-500/20 to-amber-600/10 flex items-center justify-center">
                        <Sparkles className="size-3.5 text-amber-500" />
                      </div>'''
          loading_new = '''                      <div className="size-7 shrink-0 overflow-hidden rounded-full border border-amber-500/35 bg-[#07070e]">
                        <img
                          src="/virelle-face.png"
                          alt="Virelle"
                          className="h-full w-full object-contain p-0.5"
                          draggable={false}
                        />
                      </div>'''
          loading_count = source.count(loading_old)
          if loading_count < 1:
            raise SystemExit("Director loading avatar block not found")
          source = source.replace(loading_old, loading_new)

          assistant_old = '''                      <div className="size-7 shrink-0 mt-0.5 rounded-full bg-gradient-to-br from-amber-500/20 to-amber-600/10 flex items-center justify-center">
                        <Sparkles className="size-3.5 text-amber-500" />
                      </div>'''
          assistant_new = '''                      <div className="size-7 shrink-0 mt-0.5 overflow-hidden rounded-full border border-amber-500/35 bg-[#07070e]">
                        <img
                          src="/virelle-face.png"
                          alt="Virelle"
                          className="h-full w-full object-contain p-0.5"
                          draggable={false}
                        />
                      </div>'''
          if source.count(assistant_old) != 1:
            raise SystemExit(f"Director assistant avatar block count: {source.count(assistant_old)}")
          source = source.replace(assistant_old, assistant_new, 1)

          path.write_text(source, encoding="utf-8")
          PY

      - name: Remove workflow and commit
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/apply-director-mask-identity.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Use Virelle mask throughout Director Assistant"
          git push origin HEAD:main
