name: Apply Designer Marketplace Visibility

on:
  push:
    branches:
      - designer/connected-onboarding-listings-2026-07-21
    paths:
      - ".github/workflows/apply-designer-marketplace-visibility.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: designer/connected-onboarding-listings-2026-07-21
          fetch-depth: 0
          persist-credentials: true

      - name: Publish completed active Designer profiles with listings
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("server/designer-portal-router.ts")
          source = path.read_text(encoding="utf-8")
          replacements = [
              (
                  '            logoUrl: cleanNullable(input.logoUrl),\n            brandingImages: mergeProfileDetails(profile, details),\n',
                  '            logoUrl: cleanNullable(input.logoUrl),\n            visibility:\n              profile.membershipStatus === "active"\n                ? "public"\n                : profile.visibility,\n            brandingImages: mergeProfileDetails(profile, details),\n',
              ),
              (
                  '      const db = await getDb();\n      if (!db) throw new TRPCError({ code: "INTERNAL_SERVER_ERROR" });\n      const [result] = await db.insert(wardrobeItems).values({\n',
                  '      const db = await getDb();\n      if (!db) throw new TRPCError({ code: "INTERNAL_SERVER_ERROR" });\n      if (input.publish && profile.visibility !== "public") {\n        await db\n          .update(designerProfiles)\n          .set({ visibility: "public" })\n          .where(\n            and(\n              eq(designerProfiles.id, profile.id),\n              eq(designerProfiles.userId, ctx.user.id),\n            ),\n          );\n      }\n      const [result] = await db.insert(wardrobeItems).values({\n',
              ),
          ]
          for old, new in replacements:
              count = source.count(old)
              if count != 1:
                  raise SystemExit(f"Expected one occurrence, found {count}: {old!r}")
              source = source.replace(old, new, 1)
          path.write_text(source, encoding="utf-8")
          PY

      - name: Remove temporary workflow and commit
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/apply-designer-marketplace-visibility.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Connect active Designer profiles to marketplace visibility"
          git push origin HEAD:designer/connected-onboarding-listings-2026-07-21
