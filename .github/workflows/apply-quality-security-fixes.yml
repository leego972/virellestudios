name: Apply quality and security fixes

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'audit/quality-security-pass-20260721'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Apply verified repairs
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          import json, re

          def read(path):
              return Path(path).read_text()

          def write(path, value):
              Path(path).write_text(value)

          def replace_once(path, old, new):
              value = read(path)
              count = value.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one occurrence, found {count}: {old[:80]!r}")
              write(path, value.replace(old, new, 1))

          # Dependency policy: remove advisory suppression and force patched transitive versions.
          pkg_path = Path('package.json')
          pkg = json.loads(pkg_path.read_text())
          pkg['dependencies']['dompurify'] = '^3.4.12'
          pnpm = pkg.setdefault('pnpm', {})
          pnpm.pop('auditConfig', None)
          overrides = pnpm.setdefault('overrides', {})
          overrides['@opentelemetry/core'] = '^2.9.0'
          overrides['@babel/core'] = '^7.29.7'
          overrides['body-parser'] = '^2.3.0'
          pkg_path.write_text(json.dumps(pkg, indent=2) + '\n')

          # CI must verify the exact committed lockfile, not silently rewrite it.
          for workflow in ['.github/workflows/ci.yml', '.github/workflows/security-ci.yml']:
              value = read(workflow).replace('pnpm install --no-frozen-lockfile', 'pnpm install --frozen-lockfile')
              write(workflow, value)
          security = read('.github/workflows/security-ci.yml')
          security = security.replace('pnpm audit --audit-level high 2>&1 | tee dependency-audit.txt', 'pnpm audit --audit-level moderate 2>&1 | tee dependency-audit.txt')
          security = security.replace(" ':!server/_core/byokVideoEngine.ts'", '')
          security = security.replace('Fail when dependency audit found high-severity vulnerabilities', 'Fail when dependency audit found moderate-or-higher vulnerabilities')
          write('.github/workflows/security-ci.yml', security)

          write('server/_core/sanitize.ts', '''/**
           * Input sanitisation utilities for text-only fields.
           *
           * These helpers deliberately return plain text. Rich HTML must be handled
           * by a dedicated allow-list HTML sanitiser at the rendering boundary.
           */

          const DANGEROUS_OBJECT_KEYS = new Set(["__proto__", "prototype", "constructor"]);

          function normaliseInput(input: string): string {
            return String(input ?? "")
              .normalize("NFKC")
              .replace(/\\u0000/g, "")
              .replace(/[\\u0001-\\u0008\\u000B\\u000C\\u000E-\\u001F\\u007F]/g, "");
          }

          /** Convert arbitrary HTML-like input to plain text. */
          export function stripHtml(input: string): string {
            return normaliseInput(input)
              .replace(/<!--[\\s\\S]*?-->/g, " ")
              .replace(/<\\s*(script|style|iframe|object|embed|svg|math)\\b[^>]*>[\\s\\S]*?<\\s*\\/\\s*\\1\\s*>/gi, " ")
              .replace(/<[^>]*>/g, " ")
              .replace(/&nbsp;/gi, " ")
              .replace(/&(?:amp|lt|gt|quot|#39);/gi, entity => ({
                "&amp;": "&", "&lt;": "<", "&gt;": ">", "&quot;": '"', "&#39;": "'",
              }[entity.toLowerCase()] ?? ""))
              .replace(/\\s+/g, " ")
              .trim();
          }

          /** Sanitize a string for safe storage in text-only application fields. */
          export function sanitizeText(input: string): string {
            return stripHtml(input);
          }

          /** Sanitize an object's string values recursively without prototype pollution. */
          export function sanitizeObject<T>(obj: T): T {
            if (typeof obj === "string") return sanitizeText(obj) as T;
            if (Array.isArray(obj)) return obj.map(sanitizeObject) as T;
            if (obj instanceof Date || obj === null || typeof obj !== "object") return obj;

            const result: Record<string, unknown> = {};
            for (const [key, value] of Object.entries(obj as Record<string, unknown>)) {
              if (DANGEROUS_OBJECT_KEYS.has(key)) continue;
              result[key] = sanitizeObject(value);
            }
            return result as T;
          }
          '''.replace('          ', ''))

          write('server/_core/remoteUrlSecurity.ts', '''import { lookup } from "node:dns/promises";
          import { isIP } from "node:net";

          export interface DownloadPublicFileOptions {
            maxBytes: number;
            allowedContentTypePrefixes?: string[];
            timeoutMs?: number;
            maxRedirects?: number;
          }

          function isPrivateIpv4(address: string): boolean {
            const parts = address.split(".").map(Number);
            if (parts.length !== 4 || parts.some(part => !Number.isInteger(part) || part < 0 || part > 255)) return true;
            const [a, b] = parts;
            return a === 0 || a === 10 || a === 127 ||
              (a === 169 && b === 254) ||
              (a === 172 && b >= 16 && b <= 31) ||
              (a === 192 && b === 168) ||
              (a === 100 && b >= 64 && b <= 127) ||
              a >= 224;
          }

          function isPrivateIpv6(address: string): boolean {
            const normalized = address.toLowerCase().split("%")[0];
            return normalized === "::" || normalized === "::1" ||
              normalized.startsWith("fc") || normalized.startsWith("fd") ||
              normalized.startsWith("fe8") || normalized.startsWith("fe9") ||
              normalized.startsWith("fea") || normalized.startsWith("feb") ||
              normalized.startsWith("::ffff:127.") || normalized.startsWith("::ffff:10.") ||
              normalized.startsWith("::ffff:192.168.");
          }

          function isPrivateAddress(address: string): boolean {
            const version = isIP(address);
            if (version === 4) return isPrivateIpv4(address);
            if (version === 6) return isPrivateIpv6(address);
            return true;
          }

          export function hasExactHttpsHostname(rawUrl: string, allowedHostnames: readonly string[]): boolean {
            try {
              const url = new URL(rawUrl);
              return url.protocol === "https:" && !url.username && !url.password &&
                allowedHostnames.some(host => url.hostname.toLowerCase() === host.toLowerCase());
            } catch {
              return false;
            }
          }

          export async function validatePublicHttpsUrl(rawUrl: string): Promise<URL> {
            const url = new URL(rawUrl);
            if (url.protocol !== "https:" || url.username || url.password) {
              throw new Error("Only credential-free HTTPS URLs are permitted.");
            }
            const hostname = url.hostname.toLowerCase().replace(/\\.$/, "");
            if (!hostname || hostname === "localhost" || hostname.endsWith(".localhost") ||
                hostname.endsWith(".local") || hostname.endsWith(".internal")) {
              throw new Error("Local and internal hosts are not permitted.");
            }
            if (isIP(hostname)) {
              if (isPrivateAddress(hostname)) throw new Error("Private network addresses are not permitted.");
              return url;
            }
            const addresses = await lookup(hostname, { all: true, verbatim: true });
            if (!addresses.length || addresses.some(({ address }) => isPrivateAddress(address))) {
              throw new Error("The URL resolves to a private or invalid network address.");
            }
            return url;
          }

          export async function downloadPublicFile(
            rawUrl: string,
            options: DownloadPublicFileOptions,
          ): Promise<{ buffer: Buffer; contentType: string; finalUrl: string }> {
            const maxRedirects = Math.max(0, Math.min(5, options.maxRedirects ?? 3));
            const timeoutMs = Math.max(1_000, Math.min(120_000, options.timeoutMs ?? 30_000));
            let current = rawUrl;

            for (let redirect = 0; redirect <= maxRedirects; redirect++) {
              const safeUrl = await validatePublicHttpsUrl(current);
              const response = await fetch(safeUrl, {
                redirect: "manual",
                signal: AbortSignal.timeout(timeoutMs),
                headers: { Accept: "audio/*,video/*,application/octet-stream;q=0.8" },
              });
              if ([301, 302, 303, 307, 308].includes(response.status)) {
                const location = response.headers.get("location");
                await response.body?.cancel().catch(() => undefined);
                if (!location || redirect === maxRedirects) throw new Error("Too many or invalid redirects.");
                current = new URL(location, safeUrl).toString();
                continue;
              }
              if (!response.ok) throw new Error(`Remote file request failed with HTTP ${response.status}.`);

              const contentType = (response.headers.get("content-type") || "application/octet-stream").split(";")[0].trim().toLowerCase();
              const prefixes = options.allowedContentTypePrefixes ?? [];
              if (prefixes.length && !prefixes.some(prefix => contentType.startsWith(prefix))) {
                await response.body?.cancel().catch(() => undefined);
                throw new Error(`Remote file type ${contentType} is not permitted.`);
              }
              const declaredLength = Number(response.headers.get("content-length") || 0);
              if (declaredLength > options.maxBytes) {
                await response.body?.cancel().catch(() => undefined);
                throw new Error("Remote file exceeds the maximum permitted size.");
              }
              if (!response.body) throw new Error("Remote file returned no body.");

              const chunks: Buffer[] = [];
              let total = 0;
              const reader = response.body.getReader();
              while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                total += value.byteLength;
                if (total > options.maxBytes) {
                  await reader.cancel().catch(() => undefined);
                  throw new Error("Remote file exceeds the maximum permitted size.");
                }
                chunks.push(Buffer.from(value));
              }
              return { buffer: Buffer.concat(chunks), contentType, finalUrl: safeUrl.toString() };
            }
            throw new Error("Remote file download failed.");
          }
          '''.replace('          ', ''))

          # Exact provider host checks and protected remote audio download.
          llm = read('server/_core/llm.ts')
          llm = llm.replace('import { logger } from "./logger";', 'import { logger } from "./logger";\nimport { hasExactHttpsHostname } from "./remoteUrlSecurity";')
          llm = llm.replace('provider.url.includes("openai.com")', 'hasExactHttpsHostname(provider.url, ["api.openai.com"])')
          write('server/_core/llm.ts', llm)

          voice = read('server/_core/voiceTranscription.ts')
          voice = voice.replace('import { logger } from "./logger";', 'import { logger } from "./logger";\nimport { downloadPublicFile, hasExactHttpsHostname } from "./remoteUrlSecurity";')
          old_download = '''      const response = await fetch(options.audioUrl);
                if (!response.ok) {
                  return {
                    error: "Failed to download audio file",
                    code: "INVALID_FORMAT",
                    details: `HTTP ${response.status}: ${response.statusText}`
                  };
                }
                
                audioBuffer = Buffer.from(await response.arrayBuffer());
                mimeType = response.headers.get('content-type') || 'audio/mpeg';
                
                // Check file size (16MB limit)
                const sizeMB = audioBuffer.length / (1024 * 1024);
                if (sizeMB > 16) {
                  return {
                    error: "Audio file exceeds maximum size limit",
                    code: "FILE_TOO_LARGE",
                    details: `File size is ${sizeMB.toFixed(2)}MB, maximum allowed is 16MB`
                  };
                }'''
          new_download = '''      const downloaded = await downloadPublicFile(options.audioUrl, {
                maxBytes: 16 * 1024 * 1024,
                timeoutMs: 30_000,
                maxRedirects: 3,
                allowedContentTypePrefixes: ["audio/", "video/", "application/octet-stream"],
              });
              audioBuffer = downloaded.buffer;
              mimeType = downloaded.contentType;'''
          if old_download not in voice:
              raise SystemExit('voiceTranscription download block not found')
          voice = voice.replace(old_download, new_download, 1)
          voice = voice.replace('transcriptionUrl.includes("openai.com")', 'hasExactHttpsHostname(transcriptionUrl, ["api.openai.com"])')
          voice = voice.replace('!transcriptionUrl.includes("openai.com")', '!hasExactHttpsHostname(transcriptionUrl, ["api.openai.com"])')
          write('server/_core/voiceTranscription.ts', voice)

          write('server/_core/rateLimit.ts', '''import { logger } from "./logger";
          import { TRPCError } from "@trpc/server";
          import { ENV } from "./env";
          import Redis from "ioredis";

          let redis: Redis | null = null;

          if (ENV.redisUrl) {
            try {
              redis = new Redis(ENV.redisUrl, { maxRetriesPerRequest: 1, connectTimeout: 2000 });
              redis.on("error", err => logger.warn(`[RateLimit] Redis error: ${err.message}`));
            } catch (err) {
              logger.errorWithStack("[RateLimit] Failed to initialize Redis; using in-memory fallback.", err);
              redis = null;
            }
          } else if (process.env.NODE_ENV === "production") {
            logger.error("[RateLimit] REDIS_URL not set in production; per-instance in-memory fallback is active.");
          } else {
            logger.warn("[RateLimit] REDIS_URL not set; using in-memory storage in development.");
          }

          interface RateLimitEntry { count: number; resetAt: number }
          const memoryStore = new Map<string, RateLimitEntry>();
          const adminUserIds = new Set<number>();

          const FIXED_WINDOW_LUA = `
          local count = redis.call('INCR', KEYS[1])
          if count == 1 then redis.call('PEXPIRE', KEYS[1], ARGV[1]) end
          local ttl = redis.call('PTTL', KEYS[1])
          return { count, ttl }
          `;

          export function registerAdminForRateLimit(userId: number): void {
            adminUserIds.add(userId);
          }

          setInterval(() => {
            const now = Date.now();
            for (const [key, entry] of memoryStore.entries()) {
              if (now > entry.resetAt) memoryStore.delete(key);
            }
          }, 5 * 60 * 1000).unref();

          async function incrementRedisWindow(key: string, windowMs: number): Promise<{ count: number; ttl: number }> {
            if (!redis) throw new Error("Redis is unavailable");
            const raw = await redis.eval(FIXED_WINDOW_LUA, 1, key, String(windowMs));
            if (!Array.isArray(raw) || raw.length < 2) throw new Error("Redis returned an invalid rate-limit result");
            return { count: Number(raw[0]), ttl: Number(raw[1]) };
          }

          function incrementMemoryWindow(key: string, windowMs: number): { count: number; ttl: number } {
            const now = Date.now();
            const entry = memoryStore.get(key);
            if (!entry || now > entry.resetAt) {
              const resetAt = now + windowMs;
              memoryStore.set(key, { count: 1, resetAt });
              return { count: 1, ttl: windowMs };
            }
            entry.count += 1;
            return { count: entry.count, ttl: Math.max(0, entry.resetAt - now) };
          }

          async function consume(key: string, maxRequests: number, windowMs: number): Promise<{ count: number; ttl: number }> {
            if (redis) {
              try {
                return await incrementRedisWindow(key, windowMs);
              } catch (err) {
                logger.errorWithStack("[RateLimit] Redis check failed; using in-memory fallback.", err);
              }
            }
            return incrementMemoryWindow(key, windowMs);
          }

          function throwRateLimit(ttl: number, publicMessage = false): never {
            const seconds = Math.max(1, Math.ceil(ttl / 1000));
            throw new TRPCError({
              code: "TOO_MANY_REQUESTS",
              message: publicMessage
                ? `Too many requests. Please try again in ${seconds} seconds.`
                : `Rate limit exceeded. Please try again in ${seconds} seconds.`,
            });
          }

          export async function checkRateLimit(userId: number, action: string, maxRequests: number, windowMs: number): Promise<void> {
            if (adminUserIds.has(userId)) return;
            const result = await consume(`rl:${userId}:${action}`, maxRequests, windowMs);
            if (result.count > maxRequests) throwRateLimit(result.ttl);
          }

          export async function rateLimitAI(userId: number) {
            await checkRateLimit(userId, "ai-generation", 10, 60_000);
          }

          export async function rateLimitUpload(userId: number) {
            await checkRateLimit(userId, "upload", 20, 60_000);
          }

          export async function rateLimitHeavyAI(userId: number) {
            await checkRateLimit(userId, "heavy-ai", 3, 60_000);
          }

          export async function rateLimitPublicByIP(ip: string, action: string, maxRequests: number, windowMs: number): Promise<void> {
            const normalizedIp = String(ip || "unknown").slice(0, 128);
            const result = await consume(`rl:ip:${normalizedIp}:${action}`, maxRequests, windowMs);
            if (result.count > maxRequests) throwRateLimit(result.ttl, true);
          }
          '''.replace('          ', ''))

          # OAuth: trusted callback origin, Redis-backed limits, verified GitHub email only, bounded requests.
          oauth = read('server/_core/oauth.ts')
          oauth = oauth.replace('import { createSessionToken } from "./context";', 'import { createSessionToken } from "./context";\nimport { rateLimitPublicByIP } from "./rateLimit";')
          oauth = re.sub(
              r'function getCallbackUrl\(req: Request\): string \{[\s\S]*?\n\}',
              '''function getCallbackUrl(req: Request): string {
            if (ENV.publicAppUrl) {
              const base = new URL(ENV.publicAppUrl);
              if (ENV.isProduction && base.protocol !== "https:") {
                throw new Error("PUBLIC_APP_URL must use HTTPS in production");
              }
              if (base.username || base.password) throw new Error("PUBLIC_APP_URL must not contain credentials");
              base.pathname = "/api/oauth/callback";
              base.search = "";
              base.hash = "";
              return base.toString();
            }
            if (ENV.isProduction) throw new Error("PUBLIC_APP_URL must be configured for OAuth in production");
            const host = req.headers.host;
            if (!host) throw new Error("OAuth callback host is unavailable");
            return new URL("/api/oauth/callback", `${req.protocol}://${host}`).toString();
          }''',
              oauth,
              count=1,
          )
          oauth = re.sub(
              r'const passwordLoginAttempts = new Map<[\s\S]*?function clearPasswordLoginAttempts\(key: string\) \{[\s\S]*?\n\}',
              '''function requestIp(req: Request): string {
            return req.ip || req.socket.remoteAddress || "unknown";
          }

          async function allowPublicRequest(
            req: Request,
            res: Response,
            action: string,
            maxRequests: number,
            windowMs: number,
          ): Promise<boolean> {
            try {
              await rateLimitPublicByIP(requestIp(req), action, maxRequests, windowMs);
              return true;
            } catch {
              res.status(429).json({ error: "Too many requests. Please try again later." });
              return false;
            }
          }''',
              oauth,
              count=1,
          )
          old_attempt = '''      const attemptKey = passwordLoginKey(req, email);
                if (!passwordLoginAllowed(attemptKey)) {
                  res.status(429).json({ error: "Too many sign-in attempts. Try again in 15 minutes." });
                  return;
                }'''
          new_attempt = '''      if (!(await allowPublicRequest(req, res, "password-login", 30, 15 * 60_000))) return;
              const emailKey = crypto.createHash("sha256").update(email).digest("hex").slice(0, 20);
              if (!(await allowPublicRequest(req, res, `password-login:${emailKey}`, 12, 15 * 60_000))) return;'''
          if old_attempt not in oauth:
              raise SystemExit('OAuth password attempt block not found')
          oauth = oauth.replace(old_attempt, new_attempt, 1).replace('        clearPasswordLoginAttempts(attemptKey);\n', '')
          oauth = oauth.replace('app.get("/api/auth/google", (req: Request, res: Response) => {', 'app.get("/api/auth/google", async (req: Request, res: Response) => {\n    if (!(await allowPublicRequest(req, res, "oauth-google-start", 20, 15 * 60_000))) return;')
          oauth = oauth.replace('app.get("/api/auth/github", (req: Request, res: Response) => {', 'app.get("/api/auth/github", async (req: Request, res: Response) => {\n    if (!(await allowPublicRequest(req, res, "oauth-github-start", 20, 15 * 60_000))) return;')
          oauth = oauth.replace('app.get("/api/oauth/callback", async (req: Request, res: Response) => {', 'app.get("/api/oauth/callback", async (req: Request, res: Response) => {\n    if (!(await allowPublicRequest(req, res, "oauth-callback", 30, 15 * 60_000))) return;')
          oauth = oauth.replace('if (!code || !state) {', 'if (!code || code.length > 2048 || !state || !/^[a-f0-9]{48}$/i.test(state)) {', 1)
          # Add timeouts to every OAuth network request.
          oauth = oauth.replace('''          body: new URLSearchParams({
                    client_id: ENV.googleOAuthClientId,
                    client_secret: ENV.googleOAuthClientSecret,
                    code,
                    grant_type: "authorization_code",
                    redirect_uri: redirectUri,
                  }),
                });''', '''          body: new URLSearchParams({
                    client_id: ENV.googleOAuthClientId,
                    client_secret: ENV.googleOAuthClientSecret,
                    code,
                    grant_type: "authorization_code",
                    redirect_uri: redirectUri,
                  }),
                  signal: AbortSignal.timeout(10_000),
                });''')
          oauth = oauth.replace('''        const userResponse = await fetch("https://www.googleapis.com/oauth2/v3/userinfo", {
                  headers: { Authorization: `Bearer ${tokenData.access_token}` },
                });''', '''        const userResponse = await fetch("https://www.googleapis.com/oauth2/v3/userinfo", {
                  headers: { Authorization: `Bearer ${tokenData.access_token}` },
                  signal: AbortSignal.timeout(10_000),
                });''')
          oauth = oauth.replace('''        body: new URLSearchParams({
                  client_id: ENV.githubOAuthClientId,
                  client_secret: ENV.githubOAuthClientSecret,
                  code,
                  redirect_uri: redirectUri,
                }),
              });''', '''        body: new URLSearchParams({
                  client_id: ENV.githubOAuthClientId,
                  client_secret: ENV.githubOAuthClientSecret,
                  code,
                  redirect_uri: redirectUri,
                }),
                signal: AbortSignal.timeout(10_000),
              });''')
          oauth = oauth.replace('''        headers: {
                  Authorization: `Bearer ${tokenData.access_token}`,
                  "User-Agent": "virelle-studios",
                },
              });''', '''        headers: {
                  Authorization: `Bearer ${tokenData.access_token}`,
                  "User-Agent": "virelle-studios",
                },
                signal: AbortSignal.timeout(10_000),
              });''', 1)
          email_pattern = re.compile(r'      let email: string \| null = profile\.email \?\? null;[\s\S]*?      if \(!profile\.id \|\| !email\) \{')
          email_replacement = '''      const emailsResponse = await fetch("https://api.github.com/user/emails", {
                headers: {
                  Authorization: `Bearer ${tokenData.access_token}`,
                  "User-Agent": "virelle-studios",
                },
                signal: AbortSignal.timeout(10_000),
              });
              let email: string | null = null;
              if (emailsResponse.ok) {
                const emails = (await emailsResponse.json()) as Array<{
                  email: string;
                  primary: boolean;
                  verified: boolean;
                }>;
                const selected = emails.find(candidate => candidate.primary && candidate.verified)
                  || emails.find(candidate => candidate.verified);
                email = selected?.email ?? null;
              }

              if (!profile.id || !email) {'''
          oauth, count = email_pattern.subn(email_replacement, oauth, count=1)
          if count != 1:
              raise SystemExit('OAuth GitHub verified email block not found')
          write('server/_core/oauth.ts', oauth)

          write('gateway.mjs', '''import http from "node:http";
          import fs from "node:fs";
          import crypto from "node:crypto";

          const PORT_H = Number.parseInt(process.env.PORT ?? "3000", 10);
          const PORT_A = PORT_H + 1;
          const LOG_FILE = "/tmp/app.log";
          const MAX_LOG_BYTES = 1024 * 1024;

          function safeEqual(left, right) {
            const a = Buffer.from(String(left || ""));
            const b = Buffer.from(String(right || ""));
            return a.length === b.length && a.length > 0 && crypto.timingSafeEqual(a, b);
          }

          function readLogTail() {
            const stat = fs.statSync(LOG_FILE);
            const length = Math.min(stat.size, MAX_LOG_BYTES);
            const offset = Math.max(0, stat.size - length);
            const fd = fs.openSync(LOG_FILE, "r");
            try {
              const buffer = Buffer.alloc(length);
              fs.readSync(fd, buffer, 0, length, offset);
              return buffer.toString("utf8");
            } finally {
              fs.closeSync(fd);
            }
          }

          console.log(`[gateway] Starting — proxy port:${PORT_H} -> app port:${PORT_A}`);

          const gw = http.createServer((cReq, cRes) => {
            const requestUrl = new URL(cReq.url || "/", "http://localhost");
            if (requestUrl.pathname === "/debug-app-log") {
              const enabled = process.env.NODE_ENV !== "production" || process.env.ENABLE_DEBUG_LOG_ENDPOINT === "true";
              if (!enabled) {
                cRes.writeHead(404, { "Content-Type": "application/json", "Cache-Control": "no-store" });
                cRes.end(JSON.stringify({ error: "Not found" }));
                return;
              }
              const secret = process.env.DEBUG_LOG_SECRET || "";
              const provided = Array.isArray(cReq.headers["x-debug-log-token"])
                ? cReq.headers["x-debug-log-token"][0]
                : cReq.headers["x-debug-log-token"];
              if (secret.length < 32 || !safeEqual(provided, secret)) {
                cRes.writeHead(403, { "Content-Type": "application/json", "Cache-Control": "no-store" });
                cRes.end(JSON.stringify({ error: "Forbidden" }));
                return;
              }
              try {
                cRes.writeHead(200, { "Content-Type": "text/plain; charset=utf-8", "Cache-Control": "no-store" });
                cRes.end(readLogTail() || "(empty log)");
              } catch {
                cRes.writeHead(404, { "Content-Type": "text/plain; charset=utf-8", "Cache-Control": "no-store" });
                cRes.end("(log file not found)");
              }
              return;
            }

            const opts = {
              host: "127.0.0.1",
              port: PORT_A,
              path: cReq.url,
              method: cReq.method,
              headers: cReq.headers,
            };
            const pr = http.request(opts, aRes => {
              cRes.writeHead(aRes.statusCode || 502, aRes.headers);
              aRes.pipe(cRes);
            });
            pr.on("error", () => {
              if (!cRes.headersSent) {
                cRes.writeHead(503, { "Content-Type": "application/json", "Retry-After": "3", "Cache-Control": "no-store" });
                cRes.end(JSON.stringify({ ok: false, warming: true }));
              }
            });
            cReq.pipe(pr);
          });

          gw.listen(PORT_H, "0.0.0.0", () => console.log(`[gateway] Listening on 0.0.0.0:${PORT_H}`));
          process.on("SIGTERM", () => gw.close(() => process.exit(0)));
          process.on("SIGINT", () => gw.close(() => process.exit(0)));
          '''.replace('          ', ''))

          sw = read('client/public/sw.js')
          old_sw = '''self.addEventListener("message", (event) => {
            if (event.data && event.data.type === "SKIP_WAITING") {
              self.skipWaiting();
            }
          });'''
          new_sw = '''self.addEventListener("message", (event) => {
            if (!event.source || !event.data || event.data.type !== "SKIP_WAITING") return;
            try {
              const sourceUrl = new URL(event.source.url);
              if (sourceUrl.origin !== self.location.origin) return;
              self.skipWaiting();
            } catch {
              // Ignore malformed or non-window message sources.
            }
          });'''
          if old_sw not in sw:
              raise SystemExit('service worker message block not found')
          write('client/public/sw.js', sw.replace(old_sw, new_sw, 1))

          # Parameterised SQL for project thumbnails.
          worker = read('server/_core/videoJobWorker.ts')
          worker = worker.replace('dbConn.execute(sql.raw(`SELECT id, thumbnailUrl FROM projects WHERE id = ${meta.projectId} LIMIT 1`))', 'dbConn.execute(sql`SELECT id, thumbnailUrl FROM projects WHERE id = ${meta.projectId} LIMIT 1`)')
          worker = worker.replace('dbConn.execute(sql.raw(`UPDATE projects SET thumbnailUrl = \'${thumbnailUrl.replace(/\'/g, "\\\\\'")}\' WHERE id = ${meta.projectId}`))', 'dbConn.execute(sql`UPDATE projects SET thumbnailUrl = ${thumbnailUrl} WHERE id = ${meta.projectId}`)')
          write('server/_core/videoJobWorker.ts', worker)

          # Small verified quality defects.
          chart = read('client/src/components/ui/chart.tsx').replace("stroke-amber-500/20rder/50", "stroke-border/50")
          write('client/src/components/ui/chart.tsx', chart)
          series = read('client/src/pages/SeriesBible.tsx').replace('arc: ss.arc ?? ss.arc ?? "",', 'arc: ss.arc ?? "",').replace('if (activeSeries && !editingSeries) {', 'if (activeSeries) {')
          write('client/src/pages/SeriesBible.tsx', series)
          advertising = read('server/advertising-orchestrator.ts')
          advertising = advertising.replace('''    // Get affiliate stats
              // affiliatePartners table not in schema â return early
              const partners: unknown[] = [];
              if (false) await (db as any).query.affiliatePartners?.findMany({
                where: (affiliatePartners: any) => eq(affiliatePartners.status, "active"),
              });

              const thirtyDaysAgo = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000);
              const recentClicks: unknown[] = [];
              if (false) await (db as any).query.affiliateClicks?.findMany({
                where: (affiliateClicks: any) => gte(affiliateClicks.createdAt, thirtyDaysAgo),
              });''', '''    // Affiliate tables are not present in the active schema. Report a neutral
              // status instead of retaining unreachable query code that can silently rot.
              const partners: unknown[] = [];
              const recentClicks: unknown[] = [];''')
          write('server/advertising-orchestrator.ts', advertising)

          # Remove unsafe-eval from production CSP while retaining Vite development support.
          headers = read('server/_core/securityHeaders.ts')
          headers = headers.replace('''  const csp = [
              "default-src 'self'",''', '''  const scriptSources = [
              "'self'",
              "'unsafe-inline'", // required by the current inline bootstrap and JSON-LD blocks
              ...(isProd ? [] : ["'unsafe-eval'"]),
              "https://js.stripe.com",
              "https://checkout.stripe.com",
              "https://browser.sentry-cdn.com",
              "https://*.ingest.sentry.io",
            ].join(" ");

            const csp = [
              "default-src 'self'",''')
          headers = headers.replace('''    "script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com https://checkout.stripe.com https://browser.sentry-cdn.com https://*.ingest.sentry.io",''', '''    `script-src ${scriptSources}`,''')
          write('server/_core/securityHeaders.ts', headers)
          PY
      - name: Regenerate secure lockfile
        run: pnpm install --lockfile-only --no-frozen-lockfile
      - name: Verify dependency audit has no findings
        run: pnpm audit
      - name: Install and verify repository
        run: |
          pnpm install --frozen-lockfile
          pnpm check
          pnpm test
          pnpm build
        env:
          NODE_ENV: production
          VITE_APP_ID: audit-stub
          VITE_SENTRY_DSN: ""
      - name: Commit verified repairs
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Repairs are already applied."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json pnpm-lock.yaml .github/workflows/ci.yml .github/workflows/security-ci.yml \
            server/_core/sanitize.ts server/_core/remoteUrlSecurity.ts server/_core/llm.ts \
            server/_core/voiceTranscription.ts server/_core/rateLimit.ts server/_core/oauth.ts \
            gateway.mjs client/public/sw.js server/_core/videoJobWorker.ts \
            client/src/components/ui/chart.tsx client/src/pages/SeriesBible.tsx \
            server/advertising-orchestrator.ts server/_core/securityHeaders.ts
          git commit -m "Harden trust boundaries and repository verification"
          git push origin "HEAD:${{ github.head_ref }}"
