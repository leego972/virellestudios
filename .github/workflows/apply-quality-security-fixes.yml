name: Apply quality and security fixes

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'audit/quality-security-pass-20260721'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Apply verified application repairs
        run: python scripts/apply-security-pass.py
      - name: Regenerate committed dependency graph
        run: pnpm install --lockfile-only --no-frozen-lockfile
      - name: Verify unsuppressed dependency audit
        run: pnpm audit
      - name: Install exact committed dependencies
        run: pnpm install --frozen-lockfile
      - name: TypeScript check
        run: pnpm check
      - name: Unit and integration tests
        run: pnpm test
      - name: Production build
        run: pnpm build
        env:
          NODE_ENV: production
          VITE_APP_ID: audit-stub
          VITE_SENTRY_DSN: ""
      - name: Commit verified repairs
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Repairs are already applied."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Apply verified quality and security repairs"
          git pull --rebase origin "${{ github.head_ref }}"
          git push origin "HEAD:${{ github.head_ref }}"
