name: Fix SceneEditor Upload Wiring

on:
  workflow_dispatch:
  push:
    branches:
      - audit-pipeline-flow
    paths:
      - .github/workflows/scene-editor-upload-fix.yml

permissions:
  contents: write

jobs:
  patch-build-commit:
    if: ${{ !contains(github.event.head_commit.message, 'fix: wire real scene footage upload') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: audit-pipeline-flow
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch SceneEditor real footage upload
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'client/src/pages/SceneEditor.tsx';
          let src = fs.readFileSync(path, 'utf8');

          if (!src.includes('trpc.upload.footage.useMutation')) {
            const marker = `  const reorderMutation = trpc.scene.reorder.useMutation({\n    onSuccess: () => utils.scene.listByProject.invalidate({ projectId }),\n  });\n\n`;
            if (!src.includes(marker)) {
              throw new Error('Could not find reorderMutation insertion point');
            }
            src = src.replace(marker, marker + `  const uploadFootageMutation = trpc.upload.footage.useMutation();\n\n`);
          }

          const oldBlock = `                          const file = e.target.files?.[0];\n                          if (!file) return;\n                          if (file.size > 150 * 1024 * 1024) { toast.error("File too large. Max 150MB."); return; }\n                          const reader = new FileReader();\n                          reader.onload = async (ev) => {\n                            const base64 = (ev.target?.result as string).split(",")[1];\n                            try {\n                              setField("externalFootageLabel", file.name);\n                              setField("externalFootageType", "replace");\n                              setField("externalFootageUrl", \`data:\${file.type};base64,\${base64.substring(0, 20)}...pending\`);\n                            } catch (err) { console.error(err); }\n                          };\n                          reader.readAsDataURL(file);`;

          const newBlock = `                          const input = e.currentTarget;\n                          const file = input.files?.[0];\n                          if (!file) return;\n                          if (!selectedSceneId) {\n                            toast.error("Create or save this scene before uploading footage.");\n                            input.value = "";\n                            return;\n                          }\n                          if (file.size > 150 * 1024 * 1024) {\n                            toast.error("File too large. Max 150MB.");\n                            input.value = "";\n                            return;\n                          }\n                          try {\n                            const base64 = await new Promise<string>((resolve, reject) => {\n                              const reader = new FileReader();\n                              reader.onload = () => resolve((reader.result as string).split(",")[1]);\n                              reader.onerror = reject;\n                              reader.readAsDataURL(file);\n                            });\n                            const usageMode = form.externalFootageType && form.externalFootageType !== "none"\n                              ? form.externalFootageType\n                              : "replace";\n                            const result = await uploadFootageMutation.mutateAsync({\n                              base64,\n                              filename: file.name,\n                              contentType: file.type as any,\n                              sceneId: selectedSceneId,\n                              footageType: usageMode as any,\n                              label: file.name,\n                            });\n                            setField("externalFootageLabel", file.name);\n                            setField("externalFootageType", usageMode);\n                            setField("externalFootageUrl", result.url);\n                            toast.success("Footage uploaded and attached to this scene.");\n                          } catch (err: any) {\n                            toast.error(err?.message || "Footage upload failed. Please try again.");\n                          } finally {\n                            input.value = "";\n                          }`;

          if (!src.includes(oldBlock)) {
            throw new Error('Could not find placeholder external footage upload block');
          }
          src = src.replace(oldBlock, newBlock);

          src = src.replace(
            `Click to upload footage<br /><span className="text-[10px]">MP4, MOV, AVI, MKV — max 150MB</span>`,
            `{uploadFootageMutation.isPending ? "Uploading footage…" : "Click to upload footage"}<br /><span className="text-[10px]">MP4, MOV, AVI, MKV, WEBM — max 150MB</span>`
          );

          src = src.replace(
            `<option value="replace">Replace AI generation — use this footage as the scene</option>`,
            `<option value="replace">Use as final scene clip — replaces AI video for this scene</option>`
          );
          src = src.replace(
            `<option value="overlay">Overlay — composite AI elements over this footage</option>`,
            `<option value="overlay">Overlay / composite — add AI elements over this footage</option>`
          );
          src = src.replace(
            `<option value="reference">Reference only — use for style/continuity matching</option>`,
            `<option value="reference">Reference only — guide AI style, motion and continuity</option>`
          );

          if (src.includes('...pending') || src.includes('base64.substring(0, 20)')) {
            throw new Error('Placeholder upload logic still present');
          }

          fs.writeFileSync(path, src);
          NODE

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck if available
        run: pnpm run typecheck --if-present

      - name: Build
        run: pnpm run build

      - name: Verify no fake pending footage URL remains
        run: |
          ! grep -R "base64.substring(0, 20)\|\.\.\.pending" client/src/pages/SceneEditor.tsx

      - name: Commit patch
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add client/src/pages/SceneEditor.tsx
          git commit -m "fix: wire real scene footage upload"
          git push origin audit-pipeline-flow
