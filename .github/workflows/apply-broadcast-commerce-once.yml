name: Apply broadcast commerce once

on:
  push:
    branches:
      - hotfix/start-compliance-archive-worker
    paths:
      - scripts/apply-broadcast-commerce-once.mjs
      - scripts/run-broadcast-commerce-patch.mjs
      - .github/workflows/apply-broadcast-commerce-once.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: hotfix/start-compliance-archive-worker
          fetch-depth: 0

      - name: Apply deterministic source patch
        run: node scripts/run-broadcast-commerce-patch.mjs

      - name: Remove one-time patch machinery
        run: |
          rm -f scripts/apply-broadcast-commerce-once.mjs
          rm -f scripts/run-broadcast-commerce-patch.mjs
          rm -f .github/workflows/apply-broadcast-commerce-once.yml

      - name: Commit integrated implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes produced."
            exit 1
          fi
          git commit -m "Implement plain and AI-assisted broadcast commerce"
          git push origin HEAD:hotfix/start-compliance-archive-worker
