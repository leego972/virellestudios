name: CI
on:
  pull_request:
    branches: [main, master]
permissions:
  contents: write
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  source-wiring:
    name: Apply final exact source wiring
    if: startsWith(github.head_ref, 'gpt/professional-pipeline-hardening-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Patch confirmed production gaps
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              if new in text:
                  print(f"{path}: already patched")
                  return
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected exactly one source match, found {count}")
              file.write_text(text.replace(old, new, 1))
              print(f"{path}: patched")

          replace_once(
              "client/src/pages/VFXStudio.tsx",
              '''    const applyVfx = trpc.vfxSfx.applyVfxToScene.useMutation({
                onSuccess: data => { setApplyResult(data); toast.success("VFX rendered into scene"); },
                onError: e => toast.error(e.message),
              });''',
              '''    const applyVfx = trpc.vfxSfx.applyVfxToScene.useMutation({
                onSuccess: data => {
                  if (!data.enhancedImageUrl) {
                    toast.error("VFX render completed without an output image.");
                    return;
                  }
                  setApplyResult({ enhancedImageUrl: data.enhancedImageUrl });
                  toast.success("VFX rendered into scene");
                },
                onError: e => toast.error(e.message),
              });''',
          )

          replace_once(
              "server/wardrobe-marketplace-router-legacy.ts",
              'import { generateImage } from "./_core/imageGeneration";',
              'import { generateImage } from "./_core/imageGeneration";\nimport { fulfillWardrobePurchaseSession } from "./_core/wardrobePurchaseFulfillment";',
          )
          replace_once(
              "server/wardrobe-marketplace-router-legacy.ts",
              '''        const sessionMeta: Record<string, string> = {
                    userId: String(ctx.user.id),
                    leaseType: input.type,''',
              '''        const sessionMeta: Record<string, string> = {
                    type: "wardrobe_purchase",
                    userId: String(ctx.user.id),
                    leaseType: input.type,''',
          )
          replace_once(
              "server/wardrobe-marketplace-router-legacy.ts",
              '''        const pi = session.payment_intent as Stripe.PaymentIntent | null;
                  const piId = pi?.id ?? null;

                  // Guard: don't create duplicate leases for the same payment intent
                  if (piId) {
                    const existing = await db.getWardrobeLeaseByPaymentIntent(piId);
                    if (existing) return existing;
                  }

                  const meta = session.metadata ?? {};
                  const leaseType = (meta.leaseType ?? "item") as "item" | "collection";
                  const itemOrCollectionId = parseInt(meta.itemOrCollectionId ?? "0", 10);
                  const designerProfileId = parseInt(meta.designerProfileId ?? "0", 10);
                  const platformFeeCents = parseInt(meta.platformFeeCents ?? "0", 10);
                  const designerAmountCents = parseInt(meta.designerAmountCents ?? "0", 10);
                  const amountCents = session.amount_total ?? 0;

                  return db.createWardrobeLease({
                    userId: ctx.user.id,
                    designerProfileId,
                    wardrobeItemId: leaseType === "item" ? itemOrCollectionId : null,
                    collectionId: leaseType === "collection" ? itemOrCollectionId : null,
                    leaseType,
                    stripePaymentIntentId: piId,
                    stripeTransferId: null,
                    amountPaidAud: amountCents,
                    designerAmountAud: designerAmountCents,
                    platformFeeAud: platformFeeCents,
                    status: "active",
                  } as any);''',
              '''        const fulfilled = await fulfillWardrobePurchaseSession(session, ctx.user.id);
                  return fulfilled.lease;''',
          )

          replace_once(
              "server/_core/index.ts",
              'import { seedAdminUsers } from "./admin-seed";',
              'import { seedAdminUsers } from "./admin-seed";\nimport { fulfillWardrobePurchaseSession } from "./wardrobePurchaseFulfillment";',
          )
          replace_once(
              "server/_core/index.ts",
              '''          const userId = await resolveUserId(session.metadata, customerId);
                    if (userId) resolvedUserIdForAudit = userId;

                    // Check if this is a Signature Cast actor unlock''',
              '''          const userId = await resolveUserId(session.metadata, customerId);
                    if (userId) resolvedUserIdForAudit = userId;

                    if (session.metadata?.type === "wardrobe_purchase" && userId) {
                      const fulfilled = await fulfillWardrobePurchaseSession(session, userId);
                      logger.info(`[WardrobePurchase] ${fulfilled.alreadyFulfilled ? "Already fulfilled" : "Inventory activated"}: user=${userId} session=${session.id}`);
                      break;
                    }

                    // Check if this is a Signature Cast actor unlock''',
          )
          PY
      - name: Commit source wiring
        shell: bash
        run: |
          git config user.name "Virelle Hardening Bot"
          git config user.email "actions@users.noreply.github.com"
          git add client/src/pages/VFXStudio.tsx server/wardrobe-marketplace-router-legacy.ts server/_core/index.ts
          git diff --cached --check
          if git diff --cached --quiet; then
            echo "Final source wiring is already present."
            exit 0
          fi
          git commit -m "Wire resilient wardrobe purchase fulfilment and VFX result guard"
          git push origin HEAD:${{ github.head_ref }}
