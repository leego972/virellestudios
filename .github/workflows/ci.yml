name: CI
on:
  pull_request:
    branches: [main, master]
permissions:
  contents: write
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  dependency-upgrade:
    name: Upgrade vulnerable Nodemailer dependency
    if: startsWith(github.head_ref, 'gpt/professional-pipeline-hardening-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - name: Upgrade Nodemailer to the patched major
        run: pnpm add nodemailer@^9.0.1
      - name: Commit dependency upgrade
        shell: bash
        run: |
          git config user.name "Virelle Hardening Bot"
          git config user.email "actions@users.noreply.github.com"
          git add package.json pnpm-lock.yaml
          git diff --cached --check
          if git diff --cached --quiet; then
            echo "Nodemailer is already on the patched version."
            exit 0
          fi
          git commit -m "Upgrade Nodemailer past high-severity advisory"
          git push origin HEAD:${{ github.head_ref }}
