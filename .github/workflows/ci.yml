name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
permissions:
  contents: write
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  security-lockfile:
    name: Generate Security Lockfile
    if: github.event_name == 'pull_request' && github.head_ref == 'security/sharp-0.35.3'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.4.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Generate patched lockfile
        run: pnpm install --lockfile-only
      - name: Commit generated lockfile
        run: |
          if git diff --quiet -- pnpm-lock.yaml; then
            echo "Lockfile already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "Regenerate lockfile for sharp 0.35.3"
          git push origin HEAD:${{ github.head_ref }}

  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run TypeScript check
        id: typecheck
        shell: bash
        run: |
          set +e
          pnpm check 2>&1 | tee typecheck-errors.txt
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload TypeScript diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typescript-diagnostics
          path: typecheck-errors.txt
          retention-days: 3
      - name: Fail when TypeScript check failed
        if: steps.typecheck.outputs.exit_code != '0'
        run: exit 1

  tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run unit and integration tests
        id: tests
        shell: bash
        run: |
          set +e
          pnpm test 2>&1 | tee test-errors.txt
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-diagnostics
          path: test-errors.txt
          retention-days: 3
      - name: Fail when tests failed
        if: steps.tests.outputs.exit_code != '0'
        run: exit 1

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, tests]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
        env:
          NODE_ENV: production
          VITE_APP_ID: ci-stub
          VITE_SENTRY_DSN: ""

  e2e:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    needs: build
    if: vars.E2E_BASE_URL != ''
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps
      - name: Run E2E smoke tests
        run: pnpm exec playwright test
        env:
          E2E_BASE_URL: ${{ vars.E2E_BASE_URL }}
      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
