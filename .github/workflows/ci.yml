name: CI

on:
  pull_request:
    branches: [main, master]

permissions:
  contents: write

concurrency:
  group: broadcast-cleanup-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  cleanup:
    name: Apply broadcast compile cleanup
    if: github.head_ref == 'hotfix/start-compliance-archive-worker'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          show-progress: false

      - name: Apply cleanup
        run: node scripts/fix-broadcast-integration.mjs

      - name: Restore CI and commit fixes
        run: |
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml
          rm -f scripts/fix-broadcast-integration.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix broadcast integration compile errors"
          git push origin HEAD:${{ github.head_ref }}
