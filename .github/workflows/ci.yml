name: CI

on:
  pull_request:
    branches: [main, master]

permissions:
  contents: write

concurrency:
  group: output-minute-billing-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  apply:
    name: Apply output-minute billing
    if: github.head_ref == 'hotfix/start-compliance-archive-worker'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          show-progress: false

      - name: Apply billing patch
        run: node scripts/apply-output-minute-billing.mjs

      - name: Restore CI and commit changes
        run: |
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml
          rm -f scripts/apply-output-minute-billing.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Bill managed broadcasts by output minute"
          git push origin HEAD:${{ github.head_ref }}
