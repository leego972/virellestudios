name: Repair Lamalo catalogue edge cases

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/lamalo-catalog-edge-fix.yml"

permissions:
  contents: write

jobs:
  patch-test-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Apply guarded catalogue repair
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected one match, found {count}")
              return text.replace(old, new, 1)

          def replace_between(text: str, start_marker: str, end_marker: str, replacement: str, label: str) -> str:
              start = text.find(start_marker)
              if start < 0:
                  raise SystemExit(f"{label}: start marker not found")
              end = text.find(end_marker, start)
              if end < 0:
                  raise SystemExit(f"{label}: end marker not found")
              return text[:start] + replacement + text[end:]

          router = Path("server/lamalo-gifts-router.ts")
          text = router.read_text()
          text = replace_once(
              text,
              'const LAMALO_BRAND_NAMES = [LAMALO_BRAND_NAME, "Lamalo Fashions", "Lamalo"] as const;',
              'const LAMALO_BRAND_ALIASES = ["Lamalo Fashions", "Lamalo"] as const;',
              "brand alias declaration",
          )
          text = replace_between(
              text,
              "async function findLamaloProfile(",
              "async function hasStarterInventory(",
              '''async function findLamaloProfile(
            db: Awaited<ReturnType<typeof getDb>>,
          ): Promise<LamaloProfileRef | null> {
            if (!db) return null;
            const exact = await db
              .select({ id: designerProfiles.id, userId: designerProfiles.userId })
              .from(designerProfiles)
              .where(eq(designerProfiles.brandName, LAMALO_BRAND_NAME))
              .orderBy(asc(designerProfiles.id))
              .limit(1);
            if (exact[0]) return exact[0];

            const aliases = await db
              .select({ id: designerProfiles.id, userId: designerProfiles.userId })
              .from(designerProfiles)
              .where(inArray(designerProfiles.brandName, [...LAMALO_BRAND_ALIASES]))
              .orderBy(asc(designerProfiles.id))
              .limit(1);
            return aliases[0] ?? null;
          }

          ''',
              "canonical brand priority",
          )
          text = replace_between(
              text,
              "async function hasStarterInventory(",
              "/**\n * Production should already have Lamalo seeded.",
              '''async function hasStarterInventory(
            db: NonNullable<Awaited<ReturnType<typeof getDb>>>,
            profileId: number,
          ): Promise<boolean> {
            const rows = await db
              .select({ name: wardrobeItems.name })
              .from(wardrobeItems)
              .where(
                and(
                  eq(wardrobeItems.designerProfileId, profileId),
                  eq(wardrobeItems.visibility, "public"),
                  eq(wardrobeItems.status, "active"),
                ),
              )
              .limit(100);
            return new Set(rows.map(row => row.name).filter(Boolean)).size >= STARTER_OPTION_COUNT;
          }

          ''',
              "unique inventory count",
          )
          text = replace_once(
              text,
              '''      const existingIds = new Set(ordered.map(item => item.id));
              for (const item of fallback) {
                if (!item.name || existingIds.has(item.id)) continue;
                ordered.push(item as StarterOutfit);
                existingIds.add(item.id);
                if (ordered.length === STARTER_OPTION_COUNT) break;
              }
          ''',
              '''      const existingIds = new Set(ordered.map(item => item.id));
              const existingNames = new Set(ordered.map(item => item.name));
              for (const item of fallback) {
                if (!item.name || existingIds.has(item.id) || existingNames.has(item.name)) continue;
                ordered.push(item as StarterOutfit);
                existingIds.add(item.id);
                existingNames.add(item.name);
                if (ordered.length === STARTER_OPTION_COUNT) break;
              }
          ''',
              "fallback name deduplication",
          )
          router.write_text(text)

          checker = Path("scripts/check-lamalo-welcome-contract.mjs")
          text = checker.read_text()
          text = replace_once(
              text,
              'const picker = fs.readFileSync("client/src/components/WelcomeOutfitPicker.tsx", "utf8");',
              'const picker = fs.readFileSync("client/src/components/WelcomeOutfitPicker.tsx", "utf8");\nconst home = fs.readFileSync("client/src/pages/Home.tsx", "utf8");',
              "contract home source",
          )
          text = replace_once(
              text,
              'assert.ok(gifts.includes("db.transaction"), "welcome claim must be transactional");',
              '''assert.ok(gifts.includes("db.transaction"), "welcome claim must be transactional");
          const canonicalLookup = gifts.indexOf("eq(designerProfiles.brandName, LAMALO_BRAND_NAME)");
          const aliasLookup = gifts.indexOf("[...LAMALO_BRAND_ALIASES]");
          assert.ok(canonicalLookup >= 0 && aliasLookup > canonicalLookup, "canonical Lamalo brand must be checked before legacy aliases");
          assert.ok(gifts.includes("existingNames.has(item.name)"), "fallback welcome choices must deduplicate catalogue names");''',
              "contract catalogue assertions",
          )
          text = replace_once(
              text,
              'assert.ok(picker.includes("isStudioOpenerActive"), "picker must wait for the studio opener");',
              '''assert.ok(picker.includes("isStudioOpenerActive"), "picker must wait for the studio opener");
          assert.ok(home.includes("const [showOpener, setShowOpener] = useState(() =>"), "home must latch the opener request before the first render");''',
              "contract opener latch",
          )
          checker.write_text(text)
          PY

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lamalo welcome contract
        run: node scripts/check-lamalo-welcome-contract.mjs
      - name: TypeScript check
        run: pnpm check
      - name: Wardrobe regression tests
        run: pnpm vitest run server/wardrobePurchaseFulfillment.test.ts server/wardrobeContinuity.test.ts server/sceneWardrobeContinuity.test.ts
      - name: Render production build
        run: pnpm build

      - name: Commit verified catalogue repair
        shell: bash
        run: |
          git config user.name "Virelle Repair Bot"
          git config user.email "actions@users.noreply.github.com"
          git add server/lamalo-gifts-router.ts scripts/check-lamalo-welcome-contract.mjs
          git commit -m "Prioritize canonical Lamalo catalogue and unique choices"
          git push origin HEAD:${{ github.head_ref }}
