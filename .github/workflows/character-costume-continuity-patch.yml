name: Apply Character Costume Continuity Patch

on:
  push:
    branches:
      - fix/mandatory-character-costume-continuity
    paths:
      - ".github/scripts/apply_character_costume_continuity.py"
      - ".github/workflows/character-costume-continuity-patch.yml"
  pull_request:
    branches:
      - main
    paths:
      - ".github/scripts/apply_character_costume_continuity.py"
      - ".github/workflows/character-costume-continuity-patch.yml"

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/mandatory-character-costume-continuity
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply continuity patch and capture diagnostics
        shell: bash
        run: |
          set +e
          python .github/scripts/apply_character_costume_continuity.py > /tmp/patch-output.txt 2>&1
          PATCH_STATUS=$?
          if [ "$PATCH_STATUS" -ne 0 ]; then
            git reset --hard HEAD
            cp /tmp/patch-output.txt .github/character-costume-patch-error.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/character-costume-patch-error.txt
            git commit -m "Record character costume patch diagnostic"
            git push origin HEAD:fix/mandatory-character-costume-continuity
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Enforce character costume continuity across scenes"
          git push origin HEAD:fix/mandatory-character-costume-continuity
