name: Apply Character Costume Continuity Patch

on:
  push:
    branches:
      - fix/mandatory-character-costume-continuity
    paths:
      - ".github/scripts/apply_character_costume_continuity.py"
      - ".github/workflows/character-costume-continuity-patch.yml"

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/mandatory-character-costume-continuity
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply continuity patch
        run: python .github/scripts/apply_character_costume_continuity.py
      - name: Commit product changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Enforce character costume continuity across scenes"
          git push origin HEAD:fix/mandatory-character-costume-continuity
