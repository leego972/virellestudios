name: Focus Assigned Costume Continuity

on:
  push:
    branches:
      - fix/mandatory-character-costume-continuity
    paths:
      - ".github/scripts/focus_assigned_costume_continuity.py"
      - ".github/workflows/focus-assigned-costume-continuity.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/mandatory-character-costume-continuity
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply focused continuity patch
        run: python .github/scripts/focus_assigned_costume_continuity.py
      - name: Remove one-time patch scaffold
        run: rm -f .github/scripts/focus_assigned_costume_continuity.py .github/workflows/focus-assigned-costume-continuity.yml
      - name: Commit focused product changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Keep assigned costumes continuous without mandatory blocking"
          git push origin HEAD:fix/mandatory-character-costume-continuity
