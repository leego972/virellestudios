name: Apply Stability Audit

on:
  pull_request:
    branches:
      - main
    paths:
      - ".audit-fix/**"
      - ".github/workflows/apply-stability-audit.yml"
  push:
    branches:
      - audit/stability-2026-07-21
    paths:
      - ".audit-fix/**"
      - ".github/workflows/apply-stability-audit.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: audit/stability-2026-07-21
          fetch-depth: 0
          persist-credentials: true

      - name: Verify and rebuild staged audit payload
        shell: bash
        run: |
          set -euo pipefail
          cat \
            .audit-fix/part-00 \
            .audit-fix/part-01 \
            .audit-fix/part-02 \
            .audit-fix/part-03 \
            .audit-fix/part-04 \
            .audit-fix/part-05 \
            .audit-fix/part-06-07 \
            .audit-fix/part-08-09 \
            .audit-fix/part-10-11 \
            .audit-fix/part-12-13 \
            > "$RUNNER_TEMP/remaining.b64"

          echo "5d21d532ef29790ca68f841b5406190b1cc9dc1289b381f455e7086365bde765  $RUNNER_TEMP/remaining.b64" | sha256sum --check --status
          base64 --decode "$RUNNER_TEMP/remaining.b64" > "$RUNNER_TEMP/remaining.tar.gz"
          echo "71c2558aa3b0bcb23458de8b90c89d6a280f7bec52c67cfd8c81b5b3c06b43b0  $RUNNER_TEMP/remaining.tar.gz" | sha256sum --check --status

      - name: Repair encoding and invalid Tailwind opacity utilities
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          root = Path('.')
          byte_run = re.compile(r'[\x80-\xff]+')
          double_opacity = re.compile(
              r'(?<![A-Za-z0-9_-])'
              r'((?:bg|text|border|ring|shadow|from|via|to|divide|outline|decoration|placeholder|accent|caret|fill|stroke)-[A-Za-z0-9_:-]+)'
              r'/(?:\d{1,3})/(\d{1,3})'
              r'(?![A-Za-z0-9_/.-])'
          )

          def repair_mojibake(value: str) -> str:
              for _ in range(6):
                  changed = False

                  def decode_run(match: re.Match[str]) -> str:
                      nonlocal changed
                      raw = match.group(0)
                      try:
                          decoded = raw.encode('latin-1').decode('utf-8')
                      except (UnicodeEncodeError, UnicodeDecodeError):
                          return raw
                      if decoded != raw:
                          changed = True
                      return decoded

                  value = byte_run.sub(decode_run, value)
                  if not changed:
                      break
              return value

          for path in root.rglob('*'):
              if not path.is_file():
                  continue
              if any(part in {'.git', 'node_modules', 'dist', '.audit-fix'} for part in path.parts):
                  continue
              try:
                  raw = path.read_bytes()
                  if b'\x00' in raw:
                      continue
                  original = raw.decode('utf-8')
              except (OSError, UnicodeDecodeError):
                  continue

              repaired = repair_mojibake(original)
              repaired = double_opacity.sub(lambda match: f'{match.group(1)}/{match.group(2)}', repaired)
              if repaired != original:
                  path.write_text(repaired, encoding='utf-8')
          PY

      - name: Extract audited replacements
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf "$RUNNER_TEMP/remaining.tar.gz" -C .
          chmod +x start.sh

      - name: Remove temporary audit transport
        shell: bash
        run: |
          rm -rf .audit-fix
          rm -f .github/workflows/audit-bundle.yml
          rm -f .github/workflows/apply-stability-audit.yml

      - name: Validate executable entry points
        shell: bash
        run: |
          set -euo pipefail
          sh -n start.sh
          node --check gateway.mjs
          node --check run-migrations.mjs
          node --check seed-admin.mjs
          git diff --check

      - name: Commit audited changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No audit changes to commit."
            exit 0
          fi
          git commit -m "Apply production stability audit fixes"
          git push origin HEAD:audit/stability-2026-07-21
